                  - link "Andre Douglas" [ref=e606] [cursor=pointer]:
                    - /url: /wiki/Andre_Douglas
                  - text: ", NASA"
              - row "Mission Specialist Jenni Gibbons, CSA" [ref=e607]:
                - rowheader "Mission Specialist" [ref=e608]
