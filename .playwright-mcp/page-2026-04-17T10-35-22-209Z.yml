          - paragraph [ref=e304]:
            - text: Artemis II was a crewed lunar
            - link "flyby" [ref=e305] [cursor=pointer]:
              - /url: /wiki/Flyby_(spaceflight)
            - text: mission on April 1–11, 2026. It was the first crewed flight of the
            - link "NASA" [ref=e306] [cursor=pointer]:
              - /url: /wiki/NASA
            - text: "-led"
            - link "Artemis program" [ref=e307] [cursor=pointer]:
              - /url: /wiki/Artemis_program
            - text: and the first crewed flight beyond
            - link "low Earth orbit" [ref=e308] [cursor=pointer]:
              - /url: /wiki/Low_Earth_orbit
            - text: since
            - link "Apollo 17" [ref=e309] [cursor=pointer]:
              - /url: /wiki/Apollo_17
            - text: in 1972. Artemis II was the second flight of the
            - link "Space Launch System" [ref=e310] [cursor=pointer]:
              - /url: /wiki/Space_Launch_System
            - text: (SLS) and the first crewed flight of the
            - link "Orion spacecraft" [ref=e311] [cursor=pointer]:
              - /url: /wiki/Orion_(spacecraft)
            - text: ", named Integrity by the four-person crew."
          - paragraph [ref=e312]:
            - text: The mission was a test flight supporting subsequent Artemis missions aimed at returning humans to the lunar surface. Originally designated Exploration Mission-2 (EM-2) and intended to support the canceled
            - link "Asteroid Redirect Mission" [ref=e313] [cursor=pointer]:
              - /url: /wiki/Asteroid_Redirect_Mission
            - text: ", its objectives were revised after the establishment of the Artemis program in 2017. The mission's primary goal was to validate the Orion spacecraft's systems, crew operations, and mission procedures ahead of sustained lunar exploration in future Artemis missions."
            - superscript [ref=e314]:
              - link "[10]" [ref=e315] [cursor=pointer]:
                - /url: "#cite_note-10"
            - text: Artemis II's mission objectives were similar to those of
            - link "Apollo 8" [ref=e316] [cursor=pointer]:
              - /url: /wiki/Apollo_8
            - text: in 1968, the first crewed lunar flight of the
            - link "Apollo program" [ref=e317] [cursor=pointer]:
              - /url: /wiki/Apollo_program
            - text: ", while its"
            - link "free-return trajectory" [ref=e318] [cursor=pointer]:
              - /url: /wiki/Free-return_trajectory
            - text: resembled that flown by
            - link "Apollo 13" [ref=e319] [cursor=pointer]:
              - /url: /wiki/Apollo_13
            - text: in 1970.
          - paragraph [ref=e320]:
            - text: Among the four crew members,
            - link "Victor Glover" [ref=e321] [cursor=pointer]:
              - /url: /wiki/Victor_Glover
            - text: is the first
            - link "person of color" [ref=e322] [cursor=pointer]:
              - /url: /wiki/Person_of_color
            - text: ","
            - link "Christina Koch" [ref=e323] [cursor=pointer]:
              - /url: /wiki/Christina_Koch
            - text: the
            - link "first woman" [ref=e324] [cursor=pointer]:
              - /url: /wiki/Women_in_space
            - text: ","
            - link "Canadian Space Agency" [ref=e325] [cursor=pointer]:
              - /url: /wiki/Canadian_Space_Agency
            - text: astronaut
            - link "Jeremy Hansen" [ref=e326] [cursor=pointer]:
              - /url: /wiki/Jeremy_Hansen
            - text: the first non-U.S. citizen, and commander
            - link "Reid Wiseman" [ref=e327] [cursor=pointer]:
              - /url: /wiki/Reid_Wiseman
            - text: the oldest person to travel beyond low Earth orbit and around the Moon. During their lunar flyby, the crew set the record for human distance from Earth, 252,756 miles (406,771 km), breaking Apollo 13's record of 248,655 miles (400,171 km).
          - paragraph [ref=e328]:
            - text: After launch, Artemis II gained widespread global attention for its achievements and inclusive crew, giving rise to the term
            - link "Moon joy" [ref=e330] [cursor=pointer]:
              - /url: /wiki/Moon_joy
            - text: .
          - heading "History" [level=2] [ref=e332]
          - heading "Mission planning and launch date selection (2017–2021)" [level=3] [ref=e334]: Mission planning and launch date selection (2017–2021)
          - paragraph [ref=e335]:
            - text: In 2017, Exploration Mission-2 was planned as a single-launch flight of a
            - link "Space Launch System" [ref=e336] [cursor=pointer]:
              - /url: /wiki/Space_Launch_System
            - text: (SLS) Block 1B rocket equipped with the
            - link "Exploration Upper Stage" [ref=e337] [cursor=pointer]:
              - /url: /wiki/Exploration_Upper_Stage
            - text: ", carrying a lunar Block 1 Orion spacecraft, and a payload capacity of 50.7 tonnes (112,000 lb). The mission concept involved rendezvousing with an asteroid that would have been placed in lunar orbit by the robotic"
            - link "Asteroid Redirect Mission" [ref=e338] [cursor=pointer]:
              - /url: /wiki/Asteroid_Redirect_Mission
            - text: ", allowing astronauts to conduct"
            - link "spacewalks" [ref=e339] [cursor=pointer]:
              - /url: /wiki/Extravehicular_activity
            - text: and collect samples.
            - superscript [ref=e340]:
              - link "[11]" [ref=e341] [cursor=pointer]:
                - /url: "#cite_note-Space.com3-11"
            - superscript [ref=e342]:
              - link "[12]" [ref=e343] [cursor=pointer]:
                - /url: "#cite_note-SN-20150325-12"
          - paragraph [ref=e344]:
            - text: After the Asteroid Redirect Mission was cancelled in April 2017,
            - superscript [ref=e345]:
              - link "[13]" [ref=e346] [cursor=pointer]:
                - /url: "#cite_note-SN-20170614-13"
            - link "NASA" [ref=e347] [cursor=pointer]:
              - /url: /wiki/NASA
            - text: proposed an alternative mission involving an eight‑day
            - link "free-return trajectory" [ref=e348] [cursor=pointer]:
              - /url: /wiki/Free-return_trajectory
            - text: around the Moon with a crew of four astronauts.
            - superscript [ref=e349]:
              - link "[14]" [ref=e350] [cursor=pointer]:
                - /url: "#cite_note-NASA-20170804-14"
          - paragraph [ref=e351]:
            - text: Another 2017 proposal suggested sending four astronauts aboard Orion on an 8‑ to 21‑day lunar mission to deliver the first element of the planned
            - link "Lunar Gateway" [ref=e352] [cursor=pointer]:
              - /url: /wiki/Lunar_Gateway
            - text: space station.
            - superscript [ref=e353]:
              - link "[15]" [ref=e354] [cursor=pointer]:
                - /url: "#cite_note-NSF-20170406-15"
            - text: This proposal did not come to fruition, and in March 2018, NASA decided that the Gateway's initial module would instead launch on a commercial rocket
            - superscript [ref=e355]:
              - link "[16]" [ref=e356] [cursor=pointer]:
                - /url: "#cite_note-16"
            - text: due to delays in constructing the
            - link "Mobile Launcher" [ref=e357] [cursor=pointer]:
              - /url: /wiki/Mobile_launcher_platform#Space_Launch_System
            - text: required for the more powerful Exploration Upper Stage.
            - superscript [ref=e358]:
              - link "[17]" [ref=e359] [cursor=pointer]:
                - /url: "#cite_note-arstech4-17"
            - text: The SpaceX
            - link "Falcon Heavy" [ref=e360] [cursor=pointer]:
              - /url: /wiki/Falcon_Heavy
            - text: was selected as the launch vehicle.
            - superscript [ref=e361]:
              - link "[18]" [ref=e362] [cursor=pointer]:
                - /url: "#cite_note-SN-20210210-18"
            - text: However, the Lunar Gateway program was cancelled in March 2026.
            - superscript [ref=e363]:
              - link "[19]" [ref=e364] [cursor=pointer]:
                - /url: "#cite_note-arstech9-19"
          - heading "Hardware development, testing and integration (2021–2025)" [level=3] [ref=e366]: Hardware development, testing and integration (2021–2025)
          - figure "SLS core stage for Artemis II lifted into High Bay 2 of the Vehicle Assembly Building shortly after stacking operations began in December 2024" [ref=e367]:
            - link [ref=e368] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Core_Stage_Move_to_VAB_High_Bay_2_(KSC-20241211-PH-KLS01_0054).jpg
              - img [ref=e369]
            - generic [ref=e370]:
              - link "SLS core stage" [ref=e371] [cursor=pointer]:
                - /url: /wiki/SLS_core_stage
              - text: for Artemis II lifted into High Bay 2 of the
              - link "Vehicle Assembly Building" [ref=e372] [cursor=pointer]:
                - /url: /wiki/Vehicle_Assembly_Building
              - text: shortly after stacking operations began in December 2024
          - paragraph [ref=e373]:
            - text: On February 11, 2023, NASA rotated the Artemis II core stage's engine section to a horizontal position, marking the final major milestone before integration with the rest of the vehicle. On March 20, the engine section was mated with the core stage in Building 103 at the
            - link "Michoud Assembly Facility" [ref=e374] [cursor=pointer]:
              - /url: /wiki/Michoud_Assembly_Facility
            - text: in
            - link "New Orleans" [ref=e375] [cursor=pointer]:
              - /url: /wiki/New_Orleans
            - text: ", Louisiana. In March 2023, NASA initially expected to deliver the completed core stage to the"
            - link "Kennedy Space Center" [ref=e376] [cursor=pointer]:
              - /url: /wiki/Kennedy_Space_Center
            - text: (KSC) that summer,
            - superscript [ref=e377]:
              - link "[20]" [ref=e378] [cursor=pointer]:
                - /url: "#cite_note-Richardson_Mar232023-20"
            - text: but by May, the timeline had shifted to late autumn 2023.
            - superscript [ref=e379]:
              - link "[21]" [ref=e380] [cursor=pointer]:
                - /url: "#cite_note-arstech3-21"
            - superscript [ref=e381]:
              - link "[22]" [ref=e382] [cursor=pointer]:
                - /url: "#cite_note-NSF-20230502-22"
          - paragraph [ref=e383]:
            - text: The four
            - link "RS-25" [ref=e384] [cursor=pointer]:
              - /url: /wiki/RS-25
            - text: engines (serial numbers E2047, E2059, E2062, and E2063) were installed on the core stage by September 25, 2023.
            - superscript [ref=e385]:
              - link "[23]" [ref=e386] [cursor=pointer]:
                - /url: "#cite_note-Mohon_O'Brien_2022-23"
            - superscript [ref=e387]:
              - link "[24]" [ref=e388] [cursor=pointer]:
                - /url: "#cite_note-Mohon_September_2023-24"
            - text: After a leak was discovered in the oxygen‑valve hydraulics, engine E2063 was replaced with E2061 in April 2025.
            - superscript [ref=e389]:
              - link "[25]" [ref=e390] [cursor=pointer]:
                - /url: "#cite_note-arstech5-25"
          - paragraph [ref=e391]:
            - text: The fully outfitted core stage was delivered to KSC between July 16 and 25, 2024.
            - superscript [ref=e392]:
              - link "[26]" [ref=e393] [cursor=pointer]:
                - /url: "#cite_note-26"
            - superscript [ref=e394]:
              - link "[27]" [ref=e395] [cursor=pointer]:
                - /url: "#cite_note-Core_stage_shipment-27"
            - superscript [ref=e396]:
              - link "[28]" [ref=e397] [cursor=pointer]:
                - /url: "#cite_note-youtube1-28"
            - text: The adapters required for integration of the full launch vehicle reached substantial completion in June 2024 and arrived at KSC in September 2024.
            - superscript [ref=e398]:
              - link "[29]" [ref=e399] [cursor=pointer]:
                - /url: "#cite_note-NASA-20240625-29"
            - superscript [ref=e400]:
              - link "[30]" [ref=e401] [cursor=pointer]:
                - /url: "#cite_note-Space.com2-30"
          - paragraph [ref=e402]:
            - text: The Artemis II crew was announced on April 3, 2023, by NASA Administrator
            - link "Bill Nelson" [ref=e403] [cursor=pointer]:
              - /url: /wiki/Bill_Nelson
            - text: during his "State of NASA" address at a NASA facility at
            - link "Ellington Field" [ref=e404] [cursor=pointer]:
              - /url: /wiki/Ellington_Field
            - text: outside
            - link "Houston" [ref=e405] [cursor=pointer]:
              - /url: /wiki/Houston
            - text: ","
            - link "Texas" [ref=e406] [cursor=pointer]:
              - /url: /wiki/Texas
            - text: ","
            - superscript [ref=e407]:
              - link "[31]" [ref=e408] [cursor=pointer]:
                - /url: "#cite_note-sciam2-31"
            - text: and the crew made a public appearance that evening at nearby
            - link "NRG Stadium" [ref=e409] [cursor=pointer]:
              - /url: /wiki/NRG_Stadium
            - text: during the
            - link "2023 March Madness basketball championship game" [ref=e410] [cursor=pointer]:
              - /url: /wiki/2023_NCAA_Division_I_men%27s_basketball_championship_game
            - text: .
            - superscript [ref=e411]:
              - link "[32]" [ref=e412] [cursor=pointer]:
                - /url: "#cite_note-twitter2-32"
          - paragraph [ref=e413]:
            - text: NASA had originally targeted September 2024 to begin rocket-stacking operations. However, the schedule was delayed by more than two months due to investigations into issues with Orion's life-support system and unexpected
            - link "heat-shield" [ref=e414] [cursor=pointer]:
              - /url: /wiki/Atmospheric_entry#Thermal_protection_systems
            - text: damage observed after the
            - link "Artemis I" [ref=e415] [cursor=pointer]:
              - /url: /wiki/Artemis_I
            - text: reentry.
            - superscript [ref=e416]:
              - link "[33]" [ref=e417] [cursor=pointer]:
                - /url: "#cite_note-arstech2-33"
            - text: Rocket stacking began on November 20, 2024.
            - superscript [ref=e418]:
              - link "[34]" [ref=e419] [cursor=pointer]:
                - /url: "#cite_note-NASA-20241120-34"
            - text: Stacking was completed on October 20, 2025, with the installation of the fully integrated Orion spacecraft, ESM, and
            - link "launch abort system" [ref=e420] [cursor=pointer]:
              - /url: /wiki/Launch_escape_system
            - text: atop the SLS rocket.
            - superscript [ref=e421]:
              - link "[35]" [ref=e422] [cursor=pointer]:
                - /url: "#cite_note-arstech6-35"
          - heading "Heat shield concerns" [level=3] [ref=e424]
          - figure "Artemis I heat shield showing damage after recovery" [ref=e425]:
            - link [ref=e426] [cursor=pointer]:
              - /url: /wiki/File:Artemis_I_Orion_heat_shield.jpg
              - img [ref=e427]
            - generic [ref=e428]: Artemis I heat shield showing damage after recovery
          - paragraph [ref=e429]:
            - text: After the uncrewed Artemis I mission in November 2022, NASA engineers identified unexpected erosion of the Orion spacecraft's
            - link "ablative heat shield" [ref=e430] [cursor=pointer]:
              - /url: /wiki/Ablative_heat_shield
            - text: following
            - link "atmospheric reentry" [ref=e431] [cursor=pointer]:
              - /url: /wiki/Atmospheric_entry
            - text: . Post-flight inspections found areas of char loss in the
            - link "AVCOAT" [ref=e432] [cursor=pointer]:
              - /url: /wiki/AVCOAT
            - text: ablative heat shield material, in which portions of the material eroded more extensively than predicted by preflight models. NASA reported that temperatures inside the crew module remained within design limits, but the unanticipated behavior prompted further investigation. Close-up imagery of the damage was not publicly released until May 2024, when it appeared in a report issued by the
            - link "NASA Office of Inspector General" [ref=e433] [cursor=pointer]:
              - /url: /wiki/NASA_Office_of_Inspector_General
            - text: .
            - superscript [ref=e434]:
              - link "[36]" [ref=e435] [cursor=pointer]:
                - /url: "#cite_note-36"
          - paragraph [ref=e436]:
            - text: In April 2024, NASA established an independent review team to assess heat shield performance and the agency's proposed approach for the Artemis II mission. The review concluded in December 2024, after which NASA announced that it would proceed with Artemis II using the existing heat shield. NASA held a press briefing to outline its findings, but the publicly released version of the review team's report was heavily redacted, prompting criticism from some former NASA engineers and astronauts regarding the level of transparency.
            - superscript [ref=e437]:
              - link "[37]" [ref=e438] [cursor=pointer]:
                - /url: "#cite_note-Berger_2026-01-09-37"
          - paragraph [ref=e439]:
            - text: NASA engineers determined that the char loss observed during Artemis I was caused by hot gases becoming trapped within the
            - link "AVCOAT" [ref=e440] [cursor=pointer]:
              - /url: /wiki/AVCOAT
            - text: material, leading to spalling, cracking and increased localized material loss during reentry. Rather than replacing the heat shield for Artemis II, NASA modified the reentry trajectory by increasing the descent angle, reducing the time the spacecraft would spend in the thermal environment associated with the damage. According to NASA, modeling and ground testing indicated that this change would limit further char loss while remaining within Orion's structural and thermal margins.
            - superscript [ref=e441]:
              - link "[37]" [ref=e442] [cursor=pointer]:
                - /url: "#cite_note-Berger_2026-01-09-37"
          - paragraph [ref=e443]:
            - text: As part of the certification process for Artemis II, NASA conducted additional testing and analysis, including evaluations of scenarios involving more extensive heat-shield damage. NASA stated that these analyses showed the underlying structure of the Orion capsule would remain intact and capable of protecting the crew under conditions exceeding those expected during the mission's reentry.
            - superscript [ref=e444]:
              - link "[37]" [ref=e445] [cursor=pointer]:
                - /url: "#cite_note-Berger_2026-01-09-37"
          - paragraph [ref=e446]:
            - text: In January 2026, NASA Administrator
            - link "Jared Isaacman" [ref=e447] [cursor=pointer]:
              - /url: /wiki/Jared_Isaacman
            - text: stated that he supported proceeding with Artemis II using the existing heat shield after reviewing the agency's analysis and meeting with engineers and outside experts. Some participants who had previously expressed concerns indicated that the additional data addressed their questions, while others continued to object to flying the mission without a redesigned heat shield. NASA has stated that design changes addressing AVCOAT permeability are planned for the heat shield intended for Artemis III.
            - superscript [ref=e448]:
              - link "[37]" [ref=e449] [cursor=pointer]:
                - /url: "#cite_note-Berger_2026-01-09-37"
          - heading "Mission delays" [level=3] [ref=e451]
          - figure "Orion spacecraft and its European Service Module for the Artemis II mission being prepared in March 2025" [ref=e452]:
            - link [ref=e453] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Orion_Solar_Array_Wings_Installed_(jsc2025e016293).jpg
              - img [ref=e454]
            - generic [ref=e455]:
              - link "Orion spacecraft" [ref=e456] [cursor=pointer]:
                - /url: /wiki/Orion_spacecraft
              - text: and its
              - link "European Service Module" [ref=e457] [cursor=pointer]:
                - /url: /wiki/European_Service_Module
              - text: for the Artemis II mission being prepared in March 2025
          - paragraph [ref=e458]:
            - text: During preliminary reviews in 2011, the launch date was placed somewhere between 2019 and 2021, but afterwards the launch date was delayed to 2023.
            - superscript [ref=e459]:
              - link "[38]" [ref=e460] [cursor=pointer]:
                - /url: "#cite_note-NASA-20190308-38"
            - superscript [ref=e461]:
              - link "[39]" [ref=e462] [cursor=pointer]:
                - /url: "#cite_note-NSF-20181228-39"
            - text: In January 2024, the mission was expected to launch in September 2025.
            - superscript [ref=e463]:
              - link "[40]" [ref=e464] [cursor=pointer]:
                - /url: "#cite_note-SN-20240109-40"
            - text: However, in October 2024, the
            - link "NASA Office of Inspector General" [ref=e465] [cursor=pointer]:
              - /url: /wiki/NASA_Office_of_Inspector_General
            - text: determined that the
            - link "Exploration Ground Systems" [ref=e466] [cursor=pointer]:
              - /url: /wiki/Exploration_Ground_Systems
            - text: team had exhausted their time reserved for resolving any unforeseen issues, leading the office to determine that the September 2025 launch date would likely be delayed.
            - superscript [ref=e467]:
              - link "[33]" [ref=e468] [cursor=pointer]:
                - /url: "#cite_note-arstech2-33"
            - text: In December 2024, outgoing administrator Nelson announced that the launch was delayed due to the months of engineering investigations into issues with the life support system and heat shield, but they were targeting a launch in April 2026.
            - superscript [ref=e469]:
              - link "[41]" [ref=e470] [cursor=pointer]:
                - /url: "#cite_note-NYT-20241205-41"
            - superscript [ref=e471]:
              - link "[42]" [ref=e472] [cursor=pointer]:
                - /url: "#cite_note-NASA-20241205-42"
          - paragraph [ref=e473]:
            - text: In March 2025, AmericaSpace reported that the launch date could be accelerated by two months to February 2026. NASA responded in a statement, saying it could not confirm the revised date but noted, "We're looking for ways to enable an earlier launch if possible, potentially launching as soon as February 2026. A February target allows the agency to capitalize on efficiencies in the flow of operations to integrate the SLS rocket,
            - link "Orion spacecraft" [ref=e474] [cursor=pointer]:
              - /url: /wiki/Orion_(spacecraft)
            - text: ", and supporting ground systems while maintaining crew safety as the top priority.\""
            - superscript [ref=e475]:
              - link "[43]" [ref=e476] [cursor=pointer]:
                - /url: "#cite_note-americaspace1-43"
            - text: By August 2025, more mainstream outlets such as
            - link "NASASpaceflight" [ref=e477] [cursor=pointer]:
              - /url: /wiki/NASASpaceflight
            - text: ", journalist"
            - link "Eric Berger" [ref=e478] [cursor=pointer]:
              - /url: /wiki/Eric_Berger_(journalist)
            - text: and U.S. Senator and former astronaut
            - link "Mark Kelly" [ref=e479] [cursor=pointer]:
              - /url: /wiki/Mark_Kelly
            - text: also reported that the mission had been moved to February 2026.
            - superscript [ref=e480]:
              - link "[44]" [ref=e481] [cursor=pointer]:
                - /url: "#cite_note-NSF-20250802-44"
            - superscript [ref=e482]:
              - link "[45]" [ref=e483] [cursor=pointer]:
                - /url: "#cite_note-twitter3-45"
            - text: In September 2025, space agency officials announced that they were pursuing a launch window that opened on February 5, 2026.
            - superscript [ref=e484]:
              - link "[46]" [ref=e485] [cursor=pointer]:
                - /url: "#cite_note-arstech1-46"
          - paragraph [ref=e486]:
            - text: For the launch of lunar missions, there are both monthly
            - link "windows" [ref=e487] [cursor=pointer]:
              - /url: /wiki/Launch_window
            - text: of a few days duration each lunar month, and daily windows lasting a few hours on days within the monthly window.
            - superscript [ref=e488]:
              - link "[47]" [ref=e489] [cursor=pointer]:
                - /url: "#cite_note-47"
            - text: The revised Artemis II plan, which called for Orion to conduct a shorter skip
            - link "reentry" [ref=e490] [cursor=pointer]:
              - /url: /wiki/Atmospheric_entry
            - text: ", further constrained the days within a monthly window during which a launch could be conducted."
            - superscript [ref=e491]:
              - link "[48]" [ref=e492] [cursor=pointer]:
                - /url: "#cite_note-NSF-20241205-48"
          - figure "The Artemis II stack being rolled out of the VAB before its February launch attempt, January 2026" [ref=e493]:
            - link [ref=e494] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Rollout_(NHQ202601170068).jpg
              - img [ref=e495]
            - generic [ref=e496]: The Artemis II stack being rolled out of the VAB before its February launch attempt, January 2026
          - paragraph [ref=e497]:
            - text: The earliest launch window for Artemis II was originally set for early February 2026,
            - superscript [ref=e498]:
              - link "[49]" [ref=e499] [cursor=pointer]:
                - /url: "#cite_note-twitter4-49"
            - superscript [ref=e500]:
              - link "[50]" [ref=e501] [cursor=pointer]:
                - /url: "#cite_note-SN-20260107-50"
            - text: but launch preparations were delayed due to the
            - link "January 2026 North American winter storm" [ref=e502] [cursor=pointer]:
              - /url: /wiki/January_2026_North_American_winter_storm
            - text: .
            - superscript [ref=e503]:
              - link "[51]" [ref=e504] [cursor=pointer]:
                - /url: "#cite_note-kraft1302-51"
            - text: On January 18, 2026, the integrated SLS rocket, Orion capsule, and launch tower were rolled out from the
            - link "Vehicle Assembly Building" [ref=e505] [cursor=pointer]:
              - /url: /wiki/Vehicle_Assembly_Building
            - text: to
            - link "Launch Complex 39B" [ref=e506] [cursor=pointer]:
              - /url: /wiki/Launch_Complex_39B
            - text: .
            - superscript [ref=e507]:
              - link "[52]" [ref=e508] [cursor=pointer]:
                - /url: "#cite_note-NYT-20260117-52"
            - text: A
            - link "wet dress rehearsal" [ref=e509] [cursor=pointer]:
              - /url: /wiki/Wet_dress_rehearsal
            - text: of the countdown occurred February 2.
            - superscript [ref=e510]:
              - link "[53]" [ref=e511] [cursor=pointer]:
                - /url: "#cite_note-Redstone_Rocket_2026-01-282-53"
            - text: After the test, NASA announced that the launch would be postponed to March due to a
            - link "liquid hydrogen" [ref=e512] [cursor=pointer]:
              - /url: /wiki/Liquid_hydrogen
            - text: leak that occurred during the simulated countdown. In addition to the leak, a valve associated with Orion crew module hatch pressurization required retorquing, and closeout operations took longer than planned.
            - superscript [ref=e513]:
              - link "[54]" [ref=e514] [cursor=pointer]:
                - /url: "#cite_note-54"
            - text: A second wet dress rehearsal occurred on February 19 and was successful.
            - superscript [ref=e515]:
              - link "[55]" [ref=e516] [cursor=pointer]:
                - /url: "#cite_note-55"
          - figure "The mission's upper stage, as seen on March 20" [ref=e517]:
            - link [ref=e518] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Preflight_(NHQ202603200057).jpg
              - img [ref=e519]
            - generic [ref=e520]: The mission's upper stage, as seen on March 20
          - paragraph [ref=e521]:
            - text: On February 21, a
            - link "helium" [ref=e522] [cursor=pointer]:
              - /url: /wiki/Helium
            - text: flow issue was observed, triggering a rollback to the Vehicle Assembly Building (VAB) and delaying the mission to April.
            - superscript [ref=e523]:
              - link "[56]" [ref=e524] [cursor=pointer]:
                - /url: "#cite_note-56"
            - superscript [ref=e525]:
              - link "[57]" [ref=e526] [cursor=pointer]:
                - /url: "#cite_note-Clark_2026-02-21-57"
            - text: The rollback began on February 25 at 9:38 am EST and the integrated SLS rocket arrived back at the VAB at about 8:00 pm.
            - superscript [ref=e527]:
              - link "[58]" [ref=e528] [cursor=pointer]:
                - /url: "#cite_note-58"
            - superscript [ref=e529]:
              - link "[59]" [ref=e530] [cursor=pointer]:
                - /url: "#cite_note-59"
            - text: NASA Administrator Jared Isaacman said that an actual launch date was to be confirmed only after a successful wet dress rehearsal was complete and the results were analyzed.
            - superscript [ref=e531]:
              - link "[52]" [ref=e532] [cursor=pointer]:
                - /url: "#cite_note-NYT-20260117-52"
            - superscript [ref=e533]:
              - link "[60]" [ref=e534] [cursor=pointer]:
                - /url: "#cite_note-60"
          - heading "Launch scheduling" [level=3] [ref=e536]
          - paragraph [ref=e537]:
            - text: On March 12, after a
            - link "Flight Readiness Review" [ref=e538] [cursor=pointer]:
              - /url: /wiki/Flight_Readiness_Review
            - text: (FRR), seven two-hour launch windows were announced for 1–6 and April 30, with the first launch window being on April 1, 2026.
            - superscript [ref=e539]:
              - link "[61]" [ref=e540] [cursor=pointer]:
                - /url: "#cite_note-61"
            - text: On March 18, NASA announced that the Artemis II Space Launch System (SLS) rocket and Orion spacecraft would be
            - link "rolled out" [ref=e541] [cursor=pointer]:
              - /url: /wiki/Crawler-transporter
            - text: the next day to Launch Pad 39B at the agency's
            - link "Kennedy Space Center" [ref=e542] [cursor=pointer]:
              - /url: /wiki/Kennedy_Space_Center
            - text: in Florida. Meanwhile, the Artemis II crew entered
            - link "quarantine" [ref=e543] [cursor=pointer]:
              - /url: /wiki/Quarantine
            - text: in Houston, Texas, to ensure they remained healthy ahead of the launch.
            - superscript [ref=e544]:
              - link "[62]" [ref=e545] [cursor=pointer]:
                - /url: "#cite_note-62"
            - text: On March 20, after a delay due to high winds,
            - superscript [ref=e546]:
              - link "[63]" [ref=e547] [cursor=pointer]:
                - /url: "#cite_note-63"
            - text: the SLS was rolled out from the VAB to launch pad 39B a second time.
            - superscript [ref=e548]:
              - link "[64]" [ref=e549] [cursor=pointer]:
                - /url: "#cite_note-64"
          - heading "Crew" [level=2] [ref=e551]
          - 'figure "The backup (standing left) and prime crew of Artemis II after a news conference in December 2024. From left to right: Jenni Gibbons, Andre Douglas, Jeremy Hansen, Christina Koch, Victor Glover, Reid Wiseman" [ref=e552]':
            - link [ref=e553] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_prime_and_backup_crew.jpg
              - img [ref=e554]
            - generic [ref=e555]:
              - text: "The backup (standing left) and prime crew of Artemis II after a news conference in December 2024. From left to right:"
              - link "Jenni Gibbons" [ref=e556] [cursor=pointer]:
                - /url: /wiki/Jenni_Gibbons
              - text: ","
              - link "Andre Douglas" [ref=e557] [cursor=pointer]:
                - /url: /wiki/Andre_Douglas
              - text: ","
              - link "Jeremy Hansen" [ref=e558] [cursor=pointer]:
                - /url: /wiki/Jeremy_Hansen
              - text: ","
