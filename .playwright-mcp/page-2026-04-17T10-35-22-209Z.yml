                  - text: ", CSA"
          - paragraph [ref=e611]:
            - text: "Artemis II was crewed by four astronauts: commander"
            - link "Reid Wiseman" [ref=e612] [cursor=pointer]:
              - /url: /wiki/Reid_Wiseman
            - text: ", pilot"
            - link "Victor Glover" [ref=e613] [cursor=pointer]:
              - /url: /wiki/Victor_Glover
            - text: ", and mission specialist"
            - link "Christina Koch" [ref=e614] [cursor=pointer]:
              - /url: /wiki/Christina_Koch
            - text: ", all from the"
            - link "NASA Astronaut Corps" [ref=e615] [cursor=pointer]:
              - /url: /wiki/NASA_Astronaut_Corps
            - text: ", along with mission specialist"
            - link "Jeremy Hansen" [ref=e616] [cursor=pointer]:
              - /url: /wiki/Jeremy_Hansen
            - text: from the
            - link "Canadian Astronaut Corps" [ref=e617] [cursor=pointer]:
              - /url: /wiki/Canadian_Astronaut_Corps
            - text: .
            - superscript [ref=e618]:
              - link "[65]" [ref=e619] [cursor=pointer]:
                - /url: "#cite_note-Artemis_Crew-65"
            - text: On November 22, 2023,
            - link "Jenni Gibbons" [ref=e620] [cursor=pointer]:
              - /url: /wiki/Jenni_Gibbons
            - text: was named as Hansen's backup,
            - superscript [ref=e621]:
              - link "[66]" [ref=e622] [cursor=pointer]:
                - /url: "#cite_note-66"
            - text: and on July 3, 2024,
            - link "Andre Douglas" [ref=e623] [cursor=pointer]:
              - /url: /wiki/Andre_Douglas
            - text: was named as the backup for the three NASA astronauts.
            - superscript [ref=e624]:
              - link "[67]" [ref=e625] [cursor=pointer]:
                - /url: "#cite_note-Space.com1-67"
            - text: Glover would become the first
            - link "person of color" [ref=e626] [cursor=pointer]:
              - /url: /wiki/Person_of_color
            - text: ", Koch the"
            - link "first woman" [ref=e627] [cursor=pointer]:
              - /url: /wiki/Women_in_space
            - text: ", Wiseman the oldest person, and Hansen the first non-American to travel around the Moon. This mission was Hansen's first spaceflight. Hansen and Gibbons, both from"
            - link "Canada" [ref=e628] [cursor=pointer]:
              - /url: /wiki/Canadians
            - text: ", were selected by the Canadian Space Agency as part of a 2020 treaty"
            - superscript [ref=e629]:
              - link "[68]" [ref=e630] [cursor=pointer]:
                - /url: "#cite_note-68"
            - text: between the United States and Canada that facilitated the participation of Canadian astronauts in the Artemis program.
            - superscript [ref=e631]:
              - link "[65]" [ref=e632] [cursor=pointer]:
                - /url: "#cite_note-Artemis_Crew-65"
            - superscript [ref=e633]:
              - link "[69]" [ref=e634] [cursor=pointer]:
                - /url: "#cite_note-globalnews1-69"
            - superscript [ref=e635]:
              - link "[70]" [ref=e636] [cursor=pointer]:
                - /url: "#cite_note-70"
            - superscript [ref=e637]:
              - link "[71]" [ref=e638] [cursor=pointer]:
                - /url: "#cite_note-71"
            - text: This mission broke the record for the most people in deep space at once,
            - superscript [ref=e639]:
              - link "[72]" [ref=e640] [cursor=pointer]:
                - /url: "#cite_note-p831-72"
            - text: set at three during
            - link "Apollo 8" [ref=e641] [cursor=pointer]:
              - /url: /wiki/Apollo_8
            - text: in December 1968.
          - paragraph [ref=e642]:
            - text: Rise, a
            - link "zero-gravity" [ref=e643] [cursor=pointer]:
              - /url: /wiki/Zero-gravity
            - text: indicator
            - link "plush toy" [ref=e644] [cursor=pointer]:
              - /url: /wiki/Plush_toy
            - text: onboard Artemis II with the astronauts, was designed by 8-year-old Lucas Ye.
            - superscript [ref=e645]:
              - link "[73]" [ref=e646] [cursor=pointer]:
                - /url: "#cite_note-73"
            - superscript [ref=e647]:
              - link "[74]" [ref=e648] [cursor=pointer]:
                - /url: "#cite_note-74"
          - heading "Mission" [level=2] [ref=e650]
          - figure "Diagram showing the planned objectives of the Artemis II mission" [ref=e651]:
            - link [ref=e652] [cursor=pointer]:
              - /url: /wiki/File:Artemis_2_map_march_2023.jpg
              - img [ref=e653]
            - generic [ref=e654]: Diagram showing the planned objectives of the Artemis II mission
          - paragraph [ref=e655]:
            - text: Artemis II's mission was a crewed flight test with four astronauts evaluating the performance of the
            - link "Space Launch System" [ref=e656] [cursor=pointer]:
              - /url: /wiki/Space_Launch_System
            - text: (SLS) rocket along with the
            - link "Orion spacecraft" [ref=e657] [cursor=pointer]:
              - /url: /wiki/Orion_(spacecraft)
            - text: and its
            - link "European Service Module" [ref=e658] [cursor=pointer]:
              - /url: /wiki/European_Service_Module
            - text: (ESM) in deep space. The first day of the mission was spent largely in high Earth orbit, where the crew conducted system checkouts. Orion operated in a
            - link "highly elliptical" [ref=e659] [cursor=pointer]:
              - /url: /wiki/Highly_elliptical_orbit
            - text: ","
            - link "high Earth orbit" [ref=e660] [cursor=pointer]:
              - /url: /wiki/High_Earth_orbit
            - text: with a period of roughly 24 hours, allowing extended testing of onboard systems. During this phase, the crew evaluated life support and other critical spacecraft systems, and performed a rendezvous and proximity operations demonstration using the spent
            - link "Interim Cryogenic Propulsion Stage" [ref=e661] [cursor=pointer]:
              - /url: /wiki/Interim_Cryogenic_Propulsion_Stage
            - text: (ICPS) as a target. After NASA mission managers confirmed Orion's performance, the spacecraft executed a
            - link "trans-lunar injection" [ref=e662] [cursor=pointer]:
              - /url: /wiki/Trans-lunar_injection
            - text: (TLI) burn to depart Earth orbit. Orion then traveled toward the Moon on a
            - link "free-return trajectory" [ref=e663] [cursor=pointer]:
              - /url: /wiki/Free-return_trajectory
            - text: ", looping around the far side before naturally returning toward Earth on a free-return trajectory without requiring additional propulsion for the return leg."
            - superscript [ref=e664]:
              - link "[75]" [ref=e665] [cursor=pointer]:
                - /url: "#cite_note-NASA-20180827-75"
            - superscript [ref=e666]:
              - link "[76]" [ref=e667] [cursor=pointer]:
                - /url: "#cite_note-NSF-20200625-76"
            - text: Notably, the crew received "wake-up calls" from Mission Control on every day of the flight, a NASA tradition since the Apollo missions, consisting of music designed to keep the crew on a steady rhythm and boost morale and inspirational speeches recorded specifically for the flight, including messages from Apollo astronauts
            - link "Charlie Duke" [ref=e668] [cursor=pointer]:
              - /url: /wiki/Charlie_Duke
            - text: and
            - link "Jim Lovell" [ref=e669] [cursor=pointer]:
              - /url: /wiki/Jim_Lovell
            - text: .
            - superscript [ref=e670]:
              - link "[77]" [ref=e671] [cursor=pointer]:
                - /url: "#cite_note-NASA_Day_5-77"
            - superscript [ref=e672]:
              - link "[78]" [ref=e673] [cursor=pointer]:
                - /url: "#cite_note-Zakrzewski_2026-78"
          - paragraph [ref=e674]:
            - text: "Artemis II's trajectory can be divided into several key phases, over an approximately ten-day trip:"
            - superscript [ref=e675]:
              - link "[79]" [ref=e676] [cursor=pointer]:
                - /url: "#cite_note-esa1-79"
            - superscript [ref=e677]:
              - link "[80]" [ref=e678] [cursor=pointer]:
                - /url: "#cite_note-80"
          - heading "Launch" [level=3] [ref=e680]
          - figure "Key events from launch and ascent to space" [ref=e681]:
            - link [ref=e682] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Ascent_Graphic_(Artemis_II_Mission_Trajectory_Final).jpg
              - img [ref=e683]
            - generic [ref=e684]: Key events from launch and ascent to space
          - figure "Artemis II lifts off from Launch Complex 39B at NASA's Kennedy Space Center in Florida on April 1, 2026" [ref=e685]:
            - link [ref=e686] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Launch_(NHQ20260401_admin_0025).jpg
              - img [ref=e687]
            - generic [ref=e688]: Artemis II lifts off from Launch Complex 39B at NASA's Kennedy Space Center in Florida on April 1, 2026
          - paragraph [ref=e689]:
            - text: The crew arrived at Kennedy Space Center on March 27,
            - superscript [ref=e690]:
              - link "[81]" [ref=e691] [cursor=pointer]:
                - /url: "#cite_note-NASA-2026a-81"
            - text: and the launch countdown began on March 30.
            - superscript [ref=e692]:
              - link "[82]" [ref=e693] [cursor=pointer]:
                - /url: "#cite_note-82"
            - text: The mission launched aboard an SLS rocket on April 1 from Kennedy Space Center's Launch Complex 39B at 22:35:12
            - link "UTC" [ref=e694] [cursor=pointer]:
              - /url: /wiki/Coordinated_Universal_Time
            - text: (6:35:12 p.m.
            - link "EDT" [ref=e695] [cursor=pointer]:
              - /url: /wiki/Eastern_Daylight_Time
            - text: ", local time at the launch site)."
            - superscript [ref=e696]:
              - link "[5]" [ref=e697] [cursor=pointer]:
                - /url: "#cite_note-NASA_Launch_Time-5"
            - superscript [ref=e698]:
              - link "[83]" [ref=e699] [cursor=pointer]:
                - /url: "#cite_note-83"
            - text: It was the first crewed launch from LC-39B since
            - link "STS-116" [ref=e700] [cursor=pointer]:
              - /url: /wiki/STS-116
            - text: in 2006.
          - paragraph [ref=e701]:
            - text: The four
            - link "RS-25" [ref=e702] [cursor=pointer]:
              - /url: /wiki/RS-25
            - text: main engines on the
            - link "core stage" [ref=e703] [cursor=pointer]:
              - /url: /wiki/Space_Launch_System_core_stage
            - text: ignited approximately seven seconds before liftoff; after their performance was confirmed at full power, the
            - link "solid rocket boosters" [ref=e704] [cursor=pointer]:
              - /url: /wiki/Space_Shuttle_Solid_Rocket_Booster
            - text: ", whose ignition cannot be reversed, ignited at T-0, providing the majority of thrust during the first two minutes of flight. Booster separation occurred at roughly 3,100 miles per hour (5,000 km/h) at an altitude of 30 miles (48 km). The boosters subsequently splashed down in the Atlantic Ocean about six minutes after launch. Unlike the"
            - link "Space Shuttle boosters" [ref=e705] [cursor=pointer]:
              - /url: /wiki/Space_Shuttle_Solid_Rocket_Boosters
            - text: ", the SLS boosters were not recovered."
            - superscript [ref=e706]:
              - link "[84]" [ref=e707] [cursor=pointer]:
                - /url: "#cite_note-Berger_2025-10-01-84"
            - superscript [ref=e708]:
              - link "[85]" [ref=e709] [cursor=pointer]:
                - /url: "#cite_note-Press_Kit-85"
          - paragraph [ref=e710]:
            - text: Wiseman monitored the launch from the left seat of Orion at the primary controls. The flight was fully automated, and no crew intervention was required, though Wiseman would have been able to issue an abort command if necessary. The core stage burned for about eight minutes before separation, leaving Orion in a highly elliptical orbit with an
            - link "apogee" [ref=e711] [cursor=pointer]:
              - /url: /wiki/Apsis
            - text: of roughly 1,400 miles (2,300 km), nearly five times higher than the
            - link "International Space Station" [ref=e712] [cursor=pointer]:
              - /url: /wiki/International_Space_Station
            - text: ", but a suborbital perigee. The ICPS upper stage did not fire during the initial ascent."
            - superscript [ref=e713]:
              - link "[84]" [ref=e714] [cursor=pointer]:
                - /url: "#cite_note-Berger_2025-10-01-84"
            - text: The core stage made a destructive reentry over the Pacific Ocean approximately two hours after launch.
            - superscript [ref=e715]:
              - link "[85]" [ref=e716] [cursor=pointer]:
                - /url: "#cite_note-Press_Kit-85"
          - heading "High Earth orbit and systems checkout" [level=3] [ref=e718]
          - figure "The launch abort system after it was jettisoned, as viewed by an automatic camera on Integrity" [ref=e719]:
            - link [ref=e720] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Launch_Abort_System_Jettison.png
              - img [ref=e721]
            - generic [ref=e722]:
              - text: The
              - link "launch abort system" [ref=e723] [cursor=pointer]:
                - /url: /wiki/Launch_abort_system
              - text: after it was jettisoned, as viewed by an automatic camera on Integrity
          - paragraph [ref=e724]:
            - text: Immediately after main-engine cutoff, Koch and Hansen unstrapped from their seats to set up and test essential life support systems aboard the spacecraft, including the water dispenser, firefighting masks, and toilet. All systems checked out (after the crew resolved minor issues with the toilet and water dispenser),
            - superscript [ref=e725]:
              - link "[86]" [ref=e726] [cursor=pointer]:
                - /url: "#cite_note-AP_2026-04-03-86"
            - superscript [ref=e727]:
              - link "[87]" [ref=e728] [cursor=pointer]:
                - /url: "#cite_note-Goodwin_2026-87"
            - text: giving mission managers the confidence to proceed with the ICPS burn at apogee, about 50 minutes after liftoff, to raise Orion's
            - link "perigee" [ref=e729] [cursor=pointer]:
              - /url: /wiki/Perigee
            - text: .
            - superscript [ref=e730]:
              - link "[86]" [ref=e731] [cursor=pointer]:
                - /url: "#cite_note-AP_2026-04-03-86"
            - superscript [ref=e732]:
              - link "[88]" [ref=e733] [cursor=pointer]:
                - /url: "#cite_note-perigee1-88"
            - text: Prior to this burn, Orion's perigee was suborbital, a deliberate safety measure that would have ensured a natural reentry in the event of a major anomaly. The ICPS burn raised the perigee out of the atmosphere, placing the spacecraft into a stable
            - link "low Earth orbit" [ref=e734] [cursor=pointer]:
              - /url: /wiki/Low_Earth_orbit
            - text: .
            - superscript [ref=e735]:
              - link "[84]" [ref=e736] [cursor=pointer]:
                - /url: "#cite_note-Berger_2025-10-01-84"
            - superscript [ref=e737]:
              - link "[85]" [ref=e738] [cursor=pointer]:
                - /url: "#cite_note-Press_Kit-85"
          - paragraph [ref=e739]:
            - text: When the spacecraft reached this new perigee about an hour later, it executed a 15-minute burn to raise its next apogee to 44,000 miles (71,000 km; 38,000 nmi), establishing a 23.5-hour high Earth orbit.
            - superscript [ref=e740]:
              - link "[84]" [ref=e741] [cursor=pointer]:
                - /url: "#cite_note-Berger_2025-10-01-84"
            - text: This marked the first time a crewed spacecraft had entered a high Earth orbit without proceeding directly to the Moon.
            - superscript [ref=e742]:
              - link "[89]" [ref=e743] [cursor=pointer]:
                - /url: "#cite_note-89"
          - paragraph [ref=e744]:
            - text: After this burn, which consumed nearly all the fuel in the ICPS, the Orion and ESM separated from the upper stage. The crew then conducted a "proximity operations" demonstration using the ICPS as a target. Over approximately 70 minutes, Glover, now in the left seat of Orion, took manual control of the spacecraft and performed a series of maneuvers to
            - link "evaluate handling qualities" [ref=e745] [cursor=pointer]:
              - /url: /wiki/Cooper%E2%80%93Harper_rating_scale
            - text: and practice techniques for future
            - link "docking operations" [ref=e746] [cursor=pointer]:
              - /url: /wiki/Docking_and_berthing_of_spacecraft
            - text: . The ICPS was equipped with a docking target, enabling tests of Orion's ability to manually maneuver relative to another spacecraft using onboard navigation sensors and reaction control thrusters.
            - superscript [ref=e747]:
              - link "[84]" [ref=e748] [cursor=pointer]:
                - /url: "#cite_note-Berger_2025-10-01-84"
            - superscript [ref=e749]:
              - link "[90]" [ref=e750] [cursor=pointer]:
                - /url: "#cite_note-proxPerigee-90"
            - superscript [ref=e751]:
              - link "[91]" [ref=e752] [cursor=pointer]:
                - /url: "#cite_note-91"
          - paragraph [ref=e753]:
            - text: Following the demonstration, Orion returned to automated control while the ICPS performed a deorbit burn for
            - link "destructive reentry" [ref=e754] [cursor=pointer]:
              - /url: /wiki/Destructive_reentry
            - text: over the Pacific Ocean,
            - superscript [ref=e755]:
              - link "[84]" [ref=e756] [cursor=pointer]:
                - /url: "#cite_note-Berger_2025-10-01-84"
            - superscript [ref=e757]:
              - link "[90]" [ref=e758] [cursor=pointer]:
                - /url: "#cite_note-proxPerigee-90"
            - text: deploying its rideshare
            - link "CubeSats" [ref=e759] [cursor=pointer]:
              - /url: /wiki/CubeSat
            - text: during this phase.
            - superscript [ref=e760]:
              - link "[85]" [ref=e761] [cursor=pointer]:
                - /url: "#cite_note-Press_Kit-85"
          - paragraph [ref=e762]:
            - text: After these operations, the crew reconfigured the cabin for spaceflight, set up their
            - link "flywheel exercise" [ref=e763] [cursor=pointer]:
              - /url: /wiki/Flywheel_training
            - link "device" [ref=e764] [cursor=pointer]:
              - /url: /wiki/Orion_flywheel_exercise_device
            - text: and used it to conduct a
            - link "life-support system" [ref=e765] [cursor=pointer]:
              - /url: /wiki/Life-support_system
            - text: stress test through
            - link "physical activity" [ref=e766] [cursor=pointer]:
              - /url: /wiki/Physical_activity
            - text: ", performing both"
            - link "aerobic" [ref=e767] [cursor=pointer]:
              - /url: /wiki/Aerobic_exercise
            - text: and
            - link "resistance" [ref=e768] [cursor=pointer]:
              - /url: /wiki/Resistance_training
            - text: exercises using a compact cable-driven system designed to operate within the spacecraft's mass and volume constraints, and had dinner.
            - superscript [ref=e769]:
              - link "[84]" [ref=e770] [cursor=pointer]:
                - /url: "#cite_note-Berger_2025-10-01-84"
            - superscript [ref=e771]:
              - link "[92]" [ref=e772] [cursor=pointer]:
                - /url: "#cite_note-92"
          - paragraph [ref=e773]:
            - text: The first sleep period was divided into two four-hour segments, interrupted to monitor a 43-second burn by the European Service Module that raised the spacecraft's perigee again to prepare for a
            - link "trans-lunar injection" [ref=e774] [cursor=pointer]:
              - /url: /wiki/Trans-lunar_injection
            - text: (TLI) burn.
            - superscript [ref=e775]:
              - link "[93]" [ref=e776] [cursor=pointer]:
                - /url: "#cite_note-perigeeBurn-93"
            - text: Following the burn, the astronauts returned to sleep while NASA managers reviewed spacecraft performance before authorizing the TLI burn.
            - superscript [ref=e777]:
              - link "[84]" [ref=e778] [cursor=pointer]:
                - /url: "#cite_note-Berger_2025-10-01-84"
          - heading "Trans-lunar injection and outbound flight" [level=3] [ref=e780]
          - figure "Hello, World photograph taken by Wiseman from Integrity after trans-lunar injection, showing the full Earth with its night side illuminated by the Moon." [ref=e781]:
            - link [ref=e782] [cursor=pointer]:
              - /url: /wiki/File:Earth_From_the_Perspective_of_Artemis_II.jpg
              - img [ref=e783]
            - generic [ref=e784]:
              - link "Hello, World" [ref=e786] [cursor=pointer]:
                - /url: /wiki/Hello,_World_(photograph)
              - text: photograph taken by Wiseman from Integrity after trans-lunar injection, showing the full Earth with its night side illuminated by the Moon.
          - paragraph [ref=e787]:
            - text: On flight day 2, following completion of high Earth orbit operations and system checks, Orion performed a 5-minute, 49-second TLI burn using the ESM's
            - link "AJ10" [ref=e788] [cursor=pointer]:
              - /url: /wiki/AJ10
            - text: main engine. This was the only use of the main engine during the mission; subsequent maneuvers were carried out by the eight smaller
            - link "R-4D" [ref=e789] [cursor=pointer]:
              - /url: /wiki/R-4D
            - text: secondary engines.
            - superscript [ref=e790]:
              - link "[94]" [ref=e791] [cursor=pointer]:
                - /url: "#cite_note-Clark_2026-94"
            - text: The burn consumed approximately 1,000 pounds (450 kg) of
            - link "hypergolic propellant" [ref=e792] [cursor=pointer]:
              - /url: /wiki/Hypergolic_propellant
            - text: and placed the spacecraft on a
            - link "free-return trajectory" [ref=e793] [cursor=pointer]:
              - /url: /wiki/Free-return_trajectory
            - text: around the Moon, requiring only minor course corrections for the remainder of the mission.
            - superscript [ref=e794]:
              - link "[95]" [ref=e795] [cursor=pointer]:
                - /url: "#cite_note-95"
          - paragraph [ref=e796]:
            - text: On flight day 3, the first of three planned outbound trajectory correction burns was deemed unnecessary after Mission Control determined the spacecraft was already on a favorable trajectory.
            - superscript [ref=e797]:
              - link "[96]" [ref=e798] [cursor=pointer]:
                - /url: "#cite_note-96"
            - text: The crew encountered an issue with the built-in
            - link "space toilet" [ref=e799] [cursor=pointer]:
              - /url: /wiki/Space_toilet
            - text: when urine froze in the vent lines, preventing it from being ejected into space. This was resolved by switching on vent heaters and by rotating the spacecraft to expose the vent to the warmth of the sun, melting the urine.
            - superscript [ref=e800]:
              - link "[87]" [ref=e801] [cursor=pointer]:
                - /url: "#cite_note-Goodwin_2026-87"
          - paragraph [ref=e802]:
            - text: On flight day 4, Koch and Hansen took turns manually controlling the spacecraft to evaluate its performance in deep space. Over 41 minutes, they tested two thruster control modes (
            - link "six degrees of freedom" [ref=e803] [cursor=pointer]:
              - /url: /wiki/Six_degrees_of_freedom
            - text: and three degrees of freedom) to provide engineers with further data and perspectives on the spacecraft's handling qualities.
            - superscript [ref=e804]:
              - link "[97]" [ref=e805] [cursor=pointer]:
                - /url: "#cite_note-97"
          - paragraph [ref=e806]:
            - text: On flight day 5, Orion performed a
            - generic [ref=e807]:
              - text: "17"
              - generic [ref=e808]: +
              - text: 1⁄2
            - text: "-second outbound trajectory correction burn to refine its path to the Moon."
            - superscript [ref=e809]:
              - link "[98]" [ref=e810] [cursor=pointer]:
                - /url: "#cite_note-Loggins_2026-98"
            - text: Of the three planned outbound correction burns, this was the only one executed. The crew also tested their
            - link "Orion Crew Survival System" [ref=e811] [cursor=pointer]:
              - /url: /wiki/Artemis_program#Spacesuits
            - text: suits and conferred with mission control to review lunar surface targets for observation and photography during the flyby and finalize observation techniques.
            - superscript [ref=e812]:
              - link "[99]" [ref=e813] [cursor=pointer]:
                - /url: "#cite_note-99"
          - heading "Lunar flyby" [level=3] [ref=e815]
          - figure "Integrity approaching the Moon on April 6" [ref=e816]:
            - link [ref=e817] [cursor=pointer]:
              - /url: /wiki/File:Orion_in_the_Spotlight_(art002e009566).jpg
              - img [ref=e818]
            - generic [ref=e819]: Integrity approaching the Moon on April 6
          - paragraph [ref=e820]:
            - text: On flight day 6, Orion entered the Moon's
            - link "sphere of influence" [ref=e821] [cursor=pointer]:
              - /url: /wiki/Sphere_of_influence_(astrodynamics)
            - text: ", where lunar gravity became the dominant force shaping its trajectory."
            - superscript [ref=e822]:
              - link "[98]" [ref=e823] [cursor=pointer]:
                - /url: "#cite_note-Loggins_2026-98"
            - text: Orion flew around the Moon at a closest approach of about 4,067 miles (6,545 km; 3,534 nmi) from the far-side lunar surface at 23:00 UTC on April 6. Its farthest distance from Earth was 252,756 miles (406,771 km; 219,639 nmi) at 23:02 UTC, and it surpassed
            - link "Apollo 13" [ref=e824] [cursor=pointer]:
              - /url: /wiki/Apollo_13
            - text: "'s 248,655 miles (400,171 km; 216,075 nmi) record as the farthest crewed mission from Earth at 17:56 UTC."
            - superscript [ref=e825]:
              - link "[9]" [ref=e826] [cursor=pointer]:
                - /url: "#cite_note-Graf_2026-04-06-9"
            - superscript [ref=e827]:
              - link "[78]" [ref=e828] [cursor=pointer]:
                - /url: "#cite_note-Zakrzewski_2026-78"
            - superscript [ref=e829]:
              - link "[100]" [ref=e830] [cursor=pointer]:
                - /url: "#cite_note-space.com_timeline-100"
            - superscript [ref=e831]:
              - link "[101]" [ref=e832] [cursor=pointer]:
                - /url: "#cite_note-101"
            - text: As the crew passed behind the Moon, Orion experienced a planned loss of signal for 40 minutes, beginning at 22:46 UTC, and recovered signals from Earth at 23:24 UTC.
            - superscript [ref=e833]:
              - link "[102]" [ref=e834] [cursor=pointer]:
                - /url: "#cite_note-102"
          - paragraph [ref=e835]:
            - text: During their flyby, the crew observed two unnamed craters which they proposed be named
            - link "Integrity" [ref=e836] [cursor=pointer]:
              - /url: /wiki/Integrity_(crater)
            - text: ", after their spacecraft, and"
            - link "Carroll" [ref=e837] [cursor=pointer]:
              - /url: /wiki/Carroll_(crater)
            - text: ", after Wiseman's late wife, who died of cancer in 2020."
            - superscript [ref=e838]:
              - link "[103]" [ref=e839] [cursor=pointer]:
                - /url: "#cite_note-103"
          - figure "The crew photographed a solar eclipse, with the Moon blocking out the Sun." [ref=e840]:
            - link [ref=e841] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_in_Eclipse.jpg
              - img [ref=e842]
            - generic [ref=e843]: The crew photographed a solar eclipse, with the Moon blocking out the Sun.
          - paragraph [ref=e844]:
            - text: After the blackout, the Orion experienced a
            - link "solar eclipse" [ref=e845] [cursor=pointer]:
              - /url: /wiki/Solar_eclipse
            - text: . It lasted for 57 minutes, beginning at 01:35 UTC and lasting until 02:32 UTC. The crew donned
            - link "eclipse glasses" [ref=e846] [cursor=pointer]:
              - /url: /wiki/Eclipse_glasses
            - text: until the Sun was fully obscured, after which they observed both the
            - link "solar corona" [ref=e847] [cursor=pointer]:
              - /url: /wiki/Solar_corona
            - text: as well as "impact flashes" from
            - link "meteoroids" [ref=e848] [cursor=pointer]:
              - /url: /wiki/Meteoroid
            - text: impacting the dark portion of the Moon. Stars and planets, including Venus, Mars, Saturn and Mercury, were visible alongside the corona, as was
            - link "earthshine" [ref=e849] [cursor=pointer]:
              - /url: /wiki/Earthshine
            - text: illuminating the Moon.
            - superscript [ref=e850]:
              - link "[104]" [ref=e851] [cursor=pointer]:
                - /url: "#cite_note-Strickland-104"
            - superscript [ref=e852]:
              - link "[105]" [ref=e853] [cursor=pointer]:
                - /url: "#cite_note-105"
            - superscript [ref=e854]:
              - link "[106]" [ref=e855] [cursor=pointer]:
                - /url: "#cite_note-106"
          - heading "Return flight" [level=3] [ref=e857]
          - paragraph [ref=e858]:
            - text: On flight day 7, Orion and its crew exited the Moon's sphere of influence and began their return to Earth on a free-return trajectory.
            - superscript [ref=e859]:
              - link "[107]" [ref=e860] [cursor=pointer]:
                - /url: "#cite_note-107"
            - superscript [ref=e861]:
              - link "[108]" [ref=e862] [cursor=pointer]:
                - /url: "#cite_note-Carruth-2023-108"
            - text: The crew conducted a 15-minute audio-only call with NASA astronauts
            - link "Jessica Meir" [ref=e863] [cursor=pointer]:
              - /url: /wiki/Jessica_Meir
            - text: ","
            - link "Jack Hathaway" [ref=e864] [cursor=pointer]:
              - /url: /wiki/Jack_Hathaway
            - text: ", and"
            - link "Chris Williams" [ref=e865] [cursor=pointer]:
              - /url: /wiki/Christopher_Williams_(astronaut)
            - text: ", and ESA astronaut"
            - link "Sophie Adenot" [ref=e866] [cursor=pointer]:
              - /url: /wiki/Sophie_Adenot
            - text: aboard the
            - link "International Space Station" [ref=e867] [cursor=pointer]:
              - /url: /wiki/International_Space_Station
            - text: ","
            - superscript [ref=e868]:
              - link "[109]" [ref=e869] [cursor=pointer]:
                - /url: "#cite_note-s799-109"
            - text: pointing out that together they became the humans furthest ever from another.
            - superscript [ref=e870]:
              - link "[110]" [ref=e871] [cursor=pointer]:
                - /url: "#cite_note-i679-110"
            - text: Afterwards, they debriefed with NASA science officers on their lunar observations while memories of the flyby were still fresh. The remainder of the day included staggered off-duty periods for rest ahead of final return preparations.
            - superscript [ref=e872]:
              - link "[111]" [ref=e873] [cursor=pointer]:
                - /url: "#cite_note-111"
            - text: The day concluded with a 15-second trajectory correction burn, the first of three that refined the path of the spacecraft toward Earth.
            - superscript [ref=e874]:
              - link "[8]" [ref=e875] [cursor=pointer]:
                - /url: "#cite_note-Grimm_&_Zakrzewski_2026-8"
            - superscript [ref=e876]:
              - link "[112]" [ref=e877] [cursor=pointer]:
                - /url: "#cite_note-:1-112"
          - paragraph [ref=e878]:
            - text: On flight day 8, a planned manual control test by Wiseman and Glover was canceled so controllers could conduct additional testing of Orion's propulsion system. The change allowed engineers to gather data on a small helium leak in the ESM and better characterize its behavior in flight. Although the leak did not affect mission safety, the data is expected to inform propulsion system modifications for future Artemis missions. A planned demonstration of the spacecraft's radiation shielding was also canceled.
            - superscript [ref=e879]:
              - link "[113]" [ref=e880] [cursor=pointer]:
                - /url: "#cite_note-113"
            - superscript [ref=e881]:
              - link "[94]" [ref=e882] [cursor=pointer]:
                - /url: "#cite_note-Clark_2026-94"
          - paragraph [ref=e883]:
            - text: On flight day 9, Orion performed a 9-second trajectory correction burn to refine its return path to Earth. The remainder of the day was largely devoted to cabin preparations, with the crew stowing equipment, installing their seats, and reviewing reentry procedures ahead of splashdown.
            - superscript [ref=e884]:
              - link "[114]" [ref=e885] [cursor=pointer]:
                - /url: "#cite_note-114"
          - paragraph [ref=e886]:
            - text: On flight day 10, Orion conducted an 8-second trajectory correction burn, the final firing of the ESM before it was jettisoned prior to reentry.
            - superscript [ref=e887]:
              - link "[112]" [ref=e888] [cursor=pointer]:
                - /url: "#cite_note-:1-112"
            - text: NASA said that the mission had consumed less than half of the fuel aboard the ESM.
            - superscript [ref=e889]:
              - link "[94]" [ref=e890] [cursor=pointer]:
                - /url: "#cite_note-Clark_2026-94"
            - text: After the separation, the thrusters on the crew module fired for 19 seconds to push it away from the ESM and put it into the proper angle for reentry.
            - superscript [ref=e891]:
              - link "[115]" [ref=e892] [cursor=pointer]:
                - /url: "#cite_note-115"
          - heading "Re-entry and splashdown" [level=3] [ref=e894]
          - figure "Landing path of Artemis II" [ref=e895]:
            - link [ref=e896] [cursor=pointer]:
              - /url: /wiki/File:Artemis-ii-groundtrack.png
              - img [ref=e897]
            - generic [ref=e898]: Landing path of Artemis II
          - paragraph [ref=e899]:
            - text: On flight day 10, Integrity re-entered Earth's atmosphere at a maximum velocity of about 24,664 miles per hour (36,174 ft/s; 39,693 km/h; 11 km/s) before decelerating.
            - superscript [ref=e900]:
              - link "[116]" [ref=e901] [cursor=pointer]:
                - /url: "#cite_note-116"
            - superscript [ref=e902]:
              - link "[2]" [ref=e903] [cursor=pointer]:
                - /url: "#cite_note-BBC-2"
            - text: This maximum velocity, while higher than generally seen for missions to low Earth orbit, is comparable to those reached during lunar-return missions of the Apollo program.
            - superscript [ref=e904]:
              - link "[117]" [ref=e905] [cursor=pointer]:
                - /url: "#cite_note-117"
          - paragraph [ref=e906]:
            - text: Mission planners had originally scheduled a
            - link "skip reentry" [ref=e907] [cursor=pointer]:
              - /url: /wiki/Skip_reentry
            - text: profile, in which the Orion spacecraft would briefly dip into the upper atmosphere to generate lift, dissipate energy, and improve landing precision. However, this was replaced with a steeper direct entry trajectory to limit heating duration following the unexpected heat shield erosion observed after Artemis I's reentry.
            - superscript [ref=e908]:
              - link "[118]" [ref=e909] [cursor=pointer]:
                - /url: "#cite_note-118"
            - superscript [ref=e910]:
              - link "[119]" [ref=e911] [cursor=pointer]:
                - /url: "#cite_note-119"
          - figure "Integrity about to splashdown in the Pacific Ocean" [ref=e912]:
            - link [ref=e913] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Recovery_(NHQ202604100018).jpg
              - img [ref=e914]
            - generic [ref=e915]: Integrity about to splashdown in the Pacific Ocean
          - paragraph [ref=e916]:
            - text: Splashdown occurred April 11, 2026, 00:07:27 UTC (April 10, 5:07:27 p.m.
            - link "PDT" [ref=e917] [cursor=pointer]:
              - /url: /wiki/Pacific_Daylight_Time
            - text: local time), in the Pacific Ocean southwest of
            - link "San Diego" [ref=e918] [cursor=pointer]:
              - /url: /wiki/San_Diego
            - text: ", California,"
            - superscript [ref=e919]:
              - link "[1]" [ref=e920] [cursor=pointer]:
                - /url: "#cite_note-Navias_2026-1"
            - superscript [ref=e921]:
              - link "[120]" [ref=e922] [cursor=pointer]:
                - /url: "#cite_note-:0-120"
            - text: where the
            - link "U.S. Navy" [ref=e923] [cursor=pointer]:
              - /url: /wiki/United_States_Navy
            - text: recovered the crew.
            - superscript [ref=e924]:
              - link "[121]" [ref=e925] [cursor=pointer]:
                - /url: "#cite_note-NASA-2026b-121"
            - superscript [ref=e926]:
              - link "[122]" [ref=e927] [cursor=pointer]:
                - /url: "#cite_note-122"
            - text: It became the first crewed NASA mission to be recovered by the Navy since the
            - link "Apollo–Soyuz" [ref=e928] [cursor=pointer]:
              - /url: /wiki/Apollo%E2%80%93Soyuz
            - text: Test Project in 1975.
            - superscript [ref=e929]:
              - link "[123]" [ref=e930] [cursor=pointer]:
                - /url: "#cite_note-123"
          - paragraph [ref=e931]:
            - text: NASA confirmed on April 7, 2026 (flight day 7), that the amphibious transport dock
            - link "USS John P. Murtha" [ref=e932] [cursor=pointer]:
              - /url: /wiki/USS_John_P._Murtha
            - text: had departed
            - link "Naval Base San Diego" [ref=e933] [cursor=pointer]:
              - /url: /wiki/Naval_Base_San_Diego
            - text: for the recovery area.
            - superscript [ref=e934]:
              - link "[8]" [ref=e935] [cursor=pointer]:
                - /url: "#cite_note-Grimm_&_Zakrzewski_2026-8"
          - figure "Navy divers helping the crew onto the \"front porch\"" [ref=e936]:
            - link [ref=e937] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Splashdown_(KSC-20260410-PH-JMB01_0004).jpg
              - img [ref=e938]
            - generic [ref=e939]: Navy divers helping the crew onto the "front porch"
          - paragraph [ref=e940]:
            - text: Following splashdown, NASA reported a communications issue between Orion and recovery teams, preventing them from approaching the spacecraft. When communications were established, the joint NASA and Navy team approached the capsule in inflatable boats. Navy divers stabilized the spacecraft using a sea anchor and attached an inflatable collar to balance the spacecraft. They then attached an inflatable raft, known as a "front porch", to the side hatch, and conducted initial checks before crew egress.
            - superscript [ref=e941]:
              - link "[124]" [ref=e942] [cursor=pointer]:
                - /url: "#cite_note-CBS_splashdown-124"
            - superscript [ref=e943]:
              - link "[125]" [ref=e944] [cursor=pointer]:
                - /url: "#cite_note-125"
          - paragraph [ref=e945]:
            - text: Crew members exited the capsule individually onto the raft, where they were fitted with hoisting gear and lifted into helicopters. The helicopters transported the astronauts to the
            - link "USS John P. Murtha" [ref=e946] [cursor=pointer]:
              - /url: /wiki/USS_John_P._Murtha
            - text: ", where they were taken to the medical bay for post-flight evaluation."
            - superscript [ref=e947]:
              - link "[124]" [ref=e948] [cursor=pointer]:
                - /url: "#cite_note-CBS_splashdown-124"
            - text: Post-landing testing included functional assessments such as obstacle course activities and a simulated spacewalk to evaluate readaptation to gravity following the mission and in preparation for future lunar and
            - link "Mars operations" [ref=e949] [cursor=pointer]:
              - /url: /wiki/Human_mission_to_Mars
            - text: .
            - superscript [ref=e950]:
              - link "[121]" [ref=e951] [cursor=pointer]:
                - /url: "#cite_note-NASA-2026b-121"
          - paragraph [ref=e952]:
            - text: After crew recovery, divers attached a winch line to the capsule and secured additional tending lines. The spacecraft was drawn into a cradle within the ship's well deck, which can be partially flooded to allow the capsule to be brought aboard in the water. The well deck was then drained to secure Orion aboard. Orion was later transported to
            - link "Naval Base San Diego" [ref=e953] [cursor=pointer]:
              - /url: /wiki/Naval_Base_San_Diego
            - text: before transfer to
            - link "Kennedy Space Center" [ref=e954] [cursor=pointer]:
              - /url: /wiki/Kennedy_Space_Center
            - text: for inspection, data retrieval, refurbishment, and post-flight processing.
            - superscript [ref=e955]:
              - link "[124]" [ref=e956] [cursor=pointer]:
                - /url: "#cite_note-CBS_splashdown-124"
          - paragraph [ref=e957]:
            - text: Aerial and airborne support included a modified NASA
            - link "Martin RB-57F Canberra" [ref=e958] [cursor=pointer]:
              - /url: /wiki/Martin/General_Dynamics_RB-57F_Canberra
            - text: (N926NA), which provided high-altitude video of the landing and recovery,
            - superscript [ref=e959]:
              - link "[126]" [ref=e960] [cursor=pointer]:
                - /url: "#cite_note-126"
            - text: and a
            - link "Cessna 208 Caravan" [ref=e961] [cursor=pointer]:
              - /url: /wiki/Cessna_208_Caravan
            - text: (N97826), which transmitted live aerial views of the splashdown site.
            - superscript [ref=e962]:
              - link "[127]" [ref=e963] [cursor=pointer]:
                - /url: "#cite_note-127"
            - superscript [ref=e964]:
              - link "[128]" [ref=e965] [cursor=pointer]:
                - /url: "#cite_note-128"
            - text: Navy
            - link "Sikorsky MH-60S Seahawk" [ref=e966] [cursor=pointer]:
              - /url: /wiki/Sikorsky_SH-60_Seahawk
            - text: helicopters supported imaging and recovery operations.
            - superscript [ref=e967]:
              - link "[129]" [ref=e968] [cursor=pointer]:
                - /url: "#cite_note-129"
          - generic [ref=e970]:
            - generic [ref=e972]: Mission profile animation of Artemis II
            - generic [ref=e973]:
              - generic [ref=e974]:
                - link [ref=e977] [cursor=pointer]:
                  - /url: /wiki/File:Animation_of_Artemis_II_around_Earth.gif
                  - img [ref=e978]
                - generic [ref=e979]:
                  - link "Earth-centered inertial" [ref=e980] [cursor=pointer]:
                    - /url: /wiki/Earth-centered_inertial
                  - text: reference frame
              - generic [ref=e981]:
                - link [ref=e984] [cursor=pointer]:
                  - /url: /wiki/File:Animation_of_Artemis_II_around_Earth_-_Frame_rotating_with_Moon.gif
                  - img [ref=e985]
                - generic [ref=e986]:
                  - text: Earth-centered
                  - link "frame rotating" [ref=e987] [cursor=pointer]:
                    - /url: /wiki/Rotating_reference_frame
                  - text: with Moon
            - generic [ref=e989]:
              - generic [ref=e990]: Earth
              - text: ·
              - generic [ref=e992]: Integrity
              - text: ·
              - generic [ref=e994]: Moon
          - heading "Experiments" [level=2] [ref=e997]
          - figure "The inside of Integrity and the crew working during flight" [ref=e998]:
            - link [ref=e999] [cursor=pointer]:
              - /url: /wiki/File:Illuminated_in_Orion_(art002e004440).jpg
              - img [ref=e1000]
            - generic [ref=e1001]: The inside of Integrity and the crew working during flight
          - heading "Deep space technology for humans" [level=3] [ref=e1003]
          - paragraph [ref=e1004]:
            - text: The mission included a
            - link "payload" [ref=e1005] [cursor=pointer]:
              - /url: /wiki/Payload
            - text: titled AVATAR (A Virtual Astronaut Tissue Analog Response) which can mimic individual astronaut organs, marking the first time that AVATAR has been tested outside of the International Space Station and Earth's
            - link "Van Allen belt" [ref=e1006] [cursor=pointer]:
              - /url: /wiki/Van_Allen_radiation_belt
            - text: .
            - superscript [ref=e1007]:
              - link "[130]" [ref=e1008] [cursor=pointer]:
                - /url: "#cite_note-130"
            - superscript [ref=e1009]:
              - link "[131]" [ref=e1010] [cursor=pointer]:
                - /url: "#cite_note-131"
            - text: Crew health for this mission was critical for missions in deep space in the future. The mission also included a new payload titled ARCHeR (Artemis Research for Crew Health & Readiness). For ARCHeR, crew members wore movement and sleep monitors before, during, and after the mission to study real-time health and behavioral information for crew members so scientists could study sleep patterns and overall health performance.
            - superscript [ref=e1011]:
              - link "[121]" [ref=e1012] [cursor=pointer]:
                - /url: "#cite_note-NASA-2026b-121"
            - superscript [ref=e1013]:
              - link "[132]" [ref=e1014] [cursor=pointer]:
                - /url: "#cite_note-132"
          - paragraph [ref=e1015]:
            - text: Scientists planned to test
            - link "immunity biomarkers" [ref=e1016] [cursor=pointer]:
              - /url: /wiki/Biomarker
            - text: ", with crew providing saliva samples before, during, and after the mission to test their immune system and how they were affected by"
            - link "radiation" [ref=e1017] [cursor=pointer]:
              - /url: /wiki/Radiation
            - text: ", isolation, and the distance away from Earth during deep space flight. This mission also intended to allow astronauts and scientists to understand space weather that will be faced in future missions, as well as how humans can survive and sustain themselves in space."
            - superscript [ref=e1018]:
              - link "[121]" [ref=e1019] [cursor=pointer]:
                - /url: "#cite_note-NASA-2026b-121"
          - figure "Optical Communications System modules on the Orion spacecraft" [ref=e1020]:
            - link [ref=e1021] [cursor=pointer]:
              - /url: /wiki/File:O2O_optical_communications_modules_on_the_Orion_Spacecraft.png
              - img [ref=e1022]
            - generic [ref=e1023]: Optical Communications System modules on the Orion spacecraft
          - heading "Optical communications" [level=3] [ref=e1025]
          - paragraph [ref=e1026]:
            - text: Artemis II tested and demonstrated
            - link "optical communications" [ref=e1027] [cursor=pointer]:
              - /url: /wiki/Optical_communications
            - text: to and from Earth using the Orion Artemis II Optical Communications System (O2O), which uses laser beams. Such an optical system is smaller and lighter than conventional radio and can use less power, while increasing the rate of transmission.
            - superscript [ref=e1028]:
              - link "[133]" [ref=e1029] [cursor=pointer]:
                - /url: "#cite_note-NASA-20210603-133"
            - text: The O2O hardware is integrated into the Orion spacecraft and included an optical module (a 4-inch [100 mm] telescope and two gimbals), a
            - link "modem" [ref=e1030] [cursor=pointer]:
              - /url: /wiki/Modem
            - text: and control electronics.
            - superscript [ref=e1031]:
              - link "[133]" [ref=e1032] [cursor=pointer]:
                - /url: "#cite_note-NASA-20210603-133"
            - text: O2O communicated with ground stations in
            - link "California" [ref=e1033] [cursor=pointer]:
              - /url: /wiki/California
            - text: and
            - link "New Mexico" [ref=e1034] [cursor=pointer]:
              - /url: /wiki/New_Mexico
            - text: .
            - superscript [ref=e1035]:
              - link "[133]" [ref=e1036] [cursor=pointer]:
                - /url: "#cite_note-NASA-20210603-133"
            - text: The test device sent data to Earth with an
            - link "uplink" [ref=e1037] [cursor=pointer]:
              - /url: /wiki/Uplink
            - text: rate of up to 260
            - link "megabits" [ref=e1038] [cursor=pointer]:
              - /url: /wiki/Megabit
            - text: per second.
            - superscript [ref=e1039]:
              - link "[134]" [ref=e1040] [cursor=pointer]:
                - /url: "#cite_note-NASA-20220811-134"
          - heading "CubeSat secondary payloads" [level=3] [ref=e1042]
          - figure "CubeSats Integration" [ref=e1043]:
            - link [ref=e1044] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Payload_Integration_(KSC-20250917-PH-FMX02_0017).jpg
              - img [ref=e1045]
            - generic [ref=e1046]: CubeSats Integration
          - paragraph [ref=e1047]:
            - text: NASA's CubeSat Launch Initiative (CSLI) originally sought proposals in August 2019 from U.S. institutions and companies to fly
            - link "CubeSat" [ref=e1048] [cursor=pointer]:
              - /url: /wiki/CubeSat
            - text: missions as
            - link "secondary payloads" [ref=e1049] [cursor=pointer]:
              - /url: /wiki/Secondary_payload
            - text: aboard the SLS on the Artemis II mission.
            - superscript [ref=e1050]:
              - link "[135]" [ref=e1051] [cursor=pointer]:
                - /url: "#cite_note-F2-1-135"
            - superscript [ref=e1052]:
              - link "[136]" [ref=e1053] [cursor=pointer]:
                - /url: "#cite_note-F2-2-136"
            - text: NASA planned to accept 6-unit (12 kg, 26 lb) and 12-unit (20 kg, 44 lb) CubeSats,
            - superscript [ref=e1054]:
              - link "[137]" [ref=e1055] [cursor=pointer]:
                - /url: "#cite_note-SN-20190808-137"
            - text: which would be mounted on the inside of the stage adapter ring between the SLS upper stage and the Orion spacecraft, deploying after Orion separated into high Earth orbit.
            - superscript [ref=e1056]:
              - link "[137]" [ref=e1057] [cursor=pointer]:
                - /url: "#cite_note-SN-20190808-137"
            - text: Although selections were initially expected by February 2020,
            - superscript [ref=e1058]:
              - link "[135]" [ref=e1059] [cursor=pointer]:
                - /url: "#cite_note-F2-1-135"
            - text: all secondary payloads were removed from the mission plans in October 2021.
            - superscript [ref=e1060]:
              - link "[138]" [ref=e1061] [cursor=pointer]:
                - /url: "#cite_note-138"
          - paragraph [ref=e1062]:
            - text: In September 2024, NASA announced that it would fly five CubeSats from international partners aboard the Artemis II mission; this was later reduced to four CubeSats. The payloads, selected from nations that are signatories to the
            - link "Artemis Accords" [ref=e1063] [cursor=pointer]:
              - /url: /wiki/Artemis_Accords
            - text: ", are intended to advance global scientific and technological research while broadening international access to deep space."
            - superscript [ref=e1064]:
              - link "[139]" [ref=e1065] [cursor=pointer]:
                - /url: "#cite_note-NASA-20240920-139"
          - paragraph [ref=e1066]:
            - text: The first CubeSat selected was Germany's
            - link "TACHELES" [ref=e1068] [cursor=pointer]:
              - /url: /wiki/Tacheles_(satellite)
            - text: to examine the impact of space conditions on electrical components used in lunar vehicles.
            - superscript [ref=e1069]:
              - link "[140]" [ref=e1070] [cursor=pointer]:
                - /url: "#cite_note-140"
            - text: In May 2025, NASA announced that it had selected the
            - link "ATENEA" [ref=e1072] [cursor=pointer]:
              - /url: /wiki/ATENEA_(satellite)
            - text: satellite from
            - link "Argentina" [ref=e1073] [cursor=pointer]:
              - /url: /wiki/Argentina
            - text: "'s"
            - link "National Space Activities Commission" [ref=e1074] [cursor=pointer]:
              - /url: /wiki/National_Space_Activities_Commission
            - text: to study radiation shielding, map the surrounding radiation environment, gather
            - link "GPS" [ref=e1075] [cursor=pointer]:
              - /url: /wiki/Global_Positioning_System
            - text: data for mission planning, and test a long-distance communication system.
            - superscript [ref=e1076]:
              - link "[141]" [ref=e1077] [cursor=pointer]:
                - /url: "#cite_note-NASA-20250520-141"
            - text: The third and fourth satellites were
            - link "K-RadCube" [ref=e1079] [cursor=pointer]:
              - /url: /wiki/K-RadCube
            - text: from the
            - link "Korea AeroSpace Administration" [ref=e1080] [cursor=pointer]:
              - /url: /wiki/Korea_AeroSpace_Administration
            - text: ", to study a material simulating human tissue for the effects of space radiation, and"
            - link "SHAMS" [ref=e1082] [cursor=pointer]:
              - /url: /wiki/Space_Weather_CubeSat-1
            - text: (or SHMS,
            - superscript [ref=e1083]:
              - link "[142]" [ref=e1084] [cursor=pointer]:
                - /url: "#cite_note-142"
            - text: also referred to as Space Weather CubeSat-1) which means "Sun" in
            - link "Arabic" [ref=e1085] [cursor=pointer]:
              - /url: /wiki/Arabic
            - text: ", from the"
            - link "Saudi Space Agency" [ref=e1086] [cursor=pointer]:
              - /url: /wiki/Saudi_Space_Agency
            - text: to measure aspects of
            - link "space weather" [ref=e1087] [cursor=pointer]:
              - /url: /wiki/Space_weather
            - text: in high Earth orbit.
            - superscript [ref=e1088]:
              - link "[143]" [ref=e1089] [cursor=pointer]:
                - /url: "#cite_note-143"
            - superscript [ref=e1090]:
              - link "[144]" [ref=e1091] [cursor=pointer]:
                - /url: "#cite_note-144"
            - text: The fifth CubeSat bay was occupied by an avionics unit.
            - superscript [ref=e1092]:
              - link "[145]" [ref=e1093] [cursor=pointer]:
                - /url: "#cite_note-145"
          - paragraph [ref=e1094]:
            - text: ATENEA, which was never designed to boost itself, burned up after a single orbit, having completed its mission objectives.
            - superscript [ref=e1095]:
              - link "[146]" [ref=e1096] [cursor=pointer]:
                - /url: "#cite_note-146"
            - superscript [ref=e1097]:
              - link "[147]" [ref=e1098] [cursor=pointer]:
                - /url: "#cite_note-147"
            - text: The other three cubesats were meant to fire propulsion systems to raise their perigee and stay in orbit. However, only SHAMS was successfully able to do so, the others burned up in the atmosphere.
            - superscript [ref=e1099]:
              - link "[148]" [ref=e1100] [cursor=pointer]:
                - /url: "#cite_note-148"
            - superscript [ref=e1101]:
              - link "[149]" [ref=e1102] [cursor=pointer]:
                - /url: "#cite_note-149"
          - heading "Public outreach" [level=2] [ref=e1104]
          - note [ref=e1105]:
            - text: "See also:"
            - link "Artemis I § Public outreach" [ref=e1106] [cursor=pointer]:
              - /url: /wiki/Artemis_I#Public_outreach
          - figure "Boarding pass bearing a name that flew around the Moon on the Artemis II mission" [ref=e1107]:
            - link [ref=e1108] [cursor=pointer]:
              - /url: /wiki/File:Artemis_2_boarding_pass.jpg
              - img [ref=e1109]
            - generic [ref=e1110]: Boarding pass bearing a name that flew around the Moon on the Artemis II mission
          - paragraph [ref=e1111]:
            - text: To support public outreach, NASA provided an online program allowing members of the public to generate a "
            - link "boarding pass" [ref=e1112] [cursor=pointer]:
              - /url: /wiki/Boarding_pass
            - text: "\" for the mission, the names submitted were stored on an"
            - link "SD card" [ref=e1113] [cursor=pointer]:
              - /url: /wiki/SD_card
            - text: subsequently flown on the spacecraft.
            - superscript [ref=e1114]:
              - link "[150]" [ref=e1115] [cursor=pointer]:
                - /url: "#cite_note-sciam1-150"
          - figure "Rise, the zero-gravity indicator" [ref=e1116]:
            - link "Artemis II zero-gravity indicator called Rise. The toy is a white ball with a smile, wearing a hat of the Earth." [ref=e1117] [cursor=pointer]:
              - /url: /wiki/File:Rise_Mascot.jpg
              - img "Artemis II zero-gravity indicator called Rise. The toy is a white ball with a smile, wearing a hat of the Earth." [ref=e1118]
            - generic [ref=e1119]:
              - text: Rise, the
              - link "zero-gravity indicator" [ref=e1120] [cursor=pointer]:
                - /url: /wiki/Zero-gravity_indicator
          - paragraph [ref=e1121]:
            - text: On March 7, 2025, NASA announced the Artemis II
            - link "zero-gravity indicator" [ref=e1122] [cursor=pointer]:
              - /url: /wiki/Zero-gravity_indicators
            - text: (ZGI) design challenge to create a mascot for the mission.
            - superscript [ref=e1123]:
              - link "[151]" [ref=e1124] [cursor=pointer]:
                - /url: "#cite_note-151"
            - text: The competition received more than 2,600 submissions from over 50 countries, with a total of US$23,275 awarded to the winner and 24 finalists.
            - superscript [ref=e1125]:
              - link "[152]" [ref=e1126] [cursor=pointer]:
                - /url: "#cite_note-152"
            - text: At a pre-launch ceremony at
            - link "Kennedy Space Center" [ref=e1127] [cursor=pointer]:
              - /url: /wiki/Kennedy_Space_Center
            - text: on March 27, 2026, astronaut
            - link "Christina Koch" [ref=e1128] [cursor=pointer]:
              - /url: /wiki/Christina_Koch
            - text: announced Rise, designed by eight-year-old Lucas Ye of Mountain View, California, as the winning entry.
            - superscript [ref=e1129]:
              - link "[81]" [ref=e1130] [cursor=pointer]:
                - /url: "#cite_note-NASA-2026a-81"
            - superscript [ref=e1131]:
              - link "[153]" [ref=e1132] [cursor=pointer]:
                - /url: "#cite_note-153"
          - paragraph [ref=e1133]:
            - text: Inspired by the
            - link "Apollo 8" [ref=e1134] [cursor=pointer]:
              - /url: /wiki/Apollo_8
            - text: Earthrise photograph, Rise depicts the Moon wearing Earth as a baseball cap. NASA fabricated the plush toy out of flight-safe materials and it was tethered inside the crew cabin. The SD card containing names from the boarding pass program was sewn inside Rise.
            - superscript [ref=e1135]:
              - link "[154]" [ref=e1136] [cursor=pointer]:
                - /url: "#cite_note-154"
          - paragraph [ref=e1137]:
            - text: At the end of the mission, the crew was supposed to leave Rise in Integrity for later retrieval, but Wiseman said he felt bad leaving it behind, so he placed it inside his
            - link "dry bag" [ref=e1138] [cursor=pointer]:
              - /url: /wiki/Dry_bag
            - text: . Rise was displayed by the crew onboard the recovery ship and at postflight press conferences.
            - superscript [ref=e1139]:
              - link "[155]" [ref=e1140] [cursor=pointer]:
                - /url: "#cite_note-155"
          - paragraph [ref=e1141]:
            - text: On March 4, 2026, NASA published the astronauts' menu for Artemis II. During launch and landing, the crew could consume only
            - link "ready-to-eat foods" [ref=e1142] [cursor=pointer]:
              - /url: /wiki/Ready-to-eat_food
            - text: ", while in orbit they rehydrated"
            - link "freeze-dried" [ref=e1143] [cursor=pointer]:
              - /url: /wiki/Freeze_drying
            - text: meals using Orion's water dispenser and heated items with a
            - link "briefcase" [ref=e1144] [cursor=pointer]:
              - /url: /wiki/Briefcase
            - text: "-style"
            - link "food warmer" [ref=e1145] [cursor=pointer]:
              - /url: /wiki/Food_warmer
            - text: . The four-person crew selected the menu following preflight taste tests, balancing nutritional requirements with storage constraints. Selected items include 58
            - link "tortillas" [ref=e1146] [cursor=pointer]:
              - /url: /wiki/Tortilla
            - text: ", vegetable"
            - link "quiche" [ref=e1147] [cursor=pointer]:
              - /url: /wiki/Quiche
            - text: ", barbecued"
            - link "brisket" [ref=e1148] [cursor=pointer]:
              - /url: /wiki/Brisket
            - text: ", and spicy"
            - link "green beans" [ref=e1149] [cursor=pointer]:
              - /url: /wiki/Green_bean
            - text: ; the menu also incorporated five Canadian products in recognition of the mission's Canadian crew member. Additional provisions included 43 servings of
            - link "coffee" [ref=e1150] [cursor=pointer]:
              - /url: /wiki/Coffee
            - text: ", five varieties of"
            - link "hot sauce" [ref=e1151] [cursor=pointer]:
              - /url: /wiki/Hot_sauce
            - text: ", and condiments such as"
            - link "maple syrup" [ref=e1152] [cursor=pointer]:
              - /url: /wiki/Maple_syrup
            - text: ","
            - link "peanut butter" [ref=e1153] [cursor=pointer]:
              - /url: /wiki/Peanut_butter
            - text: ","
            - link "mustard" [ref=e1154] [cursor=pointer]:
              - /url: /wiki/Mustard_(condiment)
            - text: ","
            - link "jam" [ref=e1155] [cursor=pointer]:
              - /url: /wiki/Fruit_preserves
            - text: ","
            - link "honey" [ref=e1156] [cursor=pointer]:
              - /url: /wiki/Honey
            - text: ", and"
            - link "Nutella" [ref=e1157] [cursor=pointer]:
              - /url: /wiki/Nutella
            - text: .
            - superscript [ref=e1158]:
              - link "[156]" [ref=e1159] [cursor=pointer]:
                - /url: "#cite_note-156"
            - superscript [ref=e1160]:
              - link "[157]" [ref=e1161] [cursor=pointer]:
                - /url: "#cite_note-NBC_News_2026-04-07-157"
          - paragraph [ref=e1162]:
            - text: NASA invited people before the launch to participate in
            - link "citizen science" [ref=e1163] [cursor=pointer]:
              - /url: /wiki/Citizen_science
            - text: observation of the Moon during the mission, looking out for
            - link "impact flashes" [ref=e1164] [cursor=pointer]:
              - /url: /wiki/Lunar_transient_phenomenon#Impact_events
            - text: of meteors hitting the Moon. These will be compared with the observations made by the crew during their flyby.
            - superscript [ref=e1165]:
              - link "[158]" [ref=e1166] [cursor=pointer]:
                - /url: "#cite_note-a371-158"
          - heading "In culture" [level=2] [ref=e1168]
          - figure "The crew in a group hug with \"Rise\" floating nearby. The crew's actions came to be known as Moon joy." [ref=e1169]:
            - link [ref=e1170] [cursor=pointer]:
              - /url: /wiki/File:Moon_Joy_(art002e013367).jpg
              - img [ref=e1171]
            - generic [ref=e1172]:
              - text: The crew in a group hug with "Rise" floating nearby. The crew's actions came to be known as
              - link "Moon joy" [ref=e1174] [cursor=pointer]:
                - /url: /wiki/Moon_joy
              - text: .
          - paragraph [ref=e1175]:
            - text: The mission was broadcast by NASA throughout its duration, including live video from the spacecraft and interviews with the crew. During the mission, the crew's live descriptions of their observations and interactions contributed to NASA's use of the term
            - link "moon joy" [ref=e1177] [cursor=pointer]:
              - /url: /wiki/Overview_effect
            - text: ", which the agency defined in a social media post as \"the feeling of intense happiness and excitement that only comes from a mission to the Moon\"."
            - superscript [ref=e1178]:
              - link "[159]" [ref=e1179] [cursor=pointer]:
                - /url: "#cite_note-w358-159"
            - superscript [ref=e1180]:
              - link "[160]" [ref=e1181] [cursor=pointer]:
                - /url: "#cite_note-Mashable_20260410-160"
            - superscript [ref=e1182]:
              - link "[161]" [ref=e1183] [cursor=pointer]:
                - /url: "#cite_note-y017-161"
          - blockquote [ref=e1184]:
            - paragraph [ref=e1185]: "\"If you can't take love to the stars, then what are we doing? [...] That's why we send humans instead of robots sometimes, that's why we have that firsthand witness.\""
          - paragraph [ref=e1187]:
            - text: —
            - link "Amit Kshatriya" [ref=e1188] [cursor=pointer]:
              - /url: /wiki/Amit_Kshatriya
            - text: ", NASA Associate Administrator"
            - superscript [ref=e1189]:
              - link "[162]" [ref=e1190] [cursor=pointer]:
                - /url: "#cite_note-k896-162"
          - paragraph [ref=e1191]:
            - text: While Artemis II was not widely anticipated prior to launch,
            - superscript [ref=e1192]:
              - link "[163]" [ref=e1193] [cursor=pointer]:
                - /url: "#cite_note-t939-163"
            - superscript [ref=e1194]:
              - link "[164]" [ref=e1195] [cursor=pointer]:
                - /url: "#cite_note-c283-164"
            - text: worldwide interest increased rapidly after launch.
            - superscript [ref=e1196]:
              - link "[165]" [ref=e1197] [cursor=pointer]:
                - /url: "#cite_note-d960-165"
            - text: Public engagement during the mission has been described as an example of
            - link "collective effervescence" [ref=e1198] [cursor=pointer]:
              - /url: /wiki/Collective_effervescence
            - text: ", particularly through the crew's personal and inclusive engagement."
            - superscript [ref=e1199]:
              - link "[166]" [ref=e1200] [cursor=pointer]:
                - /url: "#cite_note-p549-166"
            - superscript [ref=e1201]:
              - link "[167]" [ref=e1202] [cursor=pointer]:
                - /url: "#cite_note-n848-167"
            - superscript [ref=e1203]:
              - link "[168]" [ref=e1204] [cursor=pointer]:
                - /url: "#cite_note-f078-168"
            - text: At the time of the mission, only about one-fourth of the
            - link "global population" [ref=e1205] [cursor=pointer]:
              - /url: /wiki/World_population
            - text: was old enough to have witnessed the previous crewed mission to lunar space,
            - link "Apollo 17" [ref=e1206] [cursor=pointer]:
              - /url: /wiki/Apollo_17
            - text: in 1972.
            - superscript [ref=e1207]:
              - link "[169]" [ref=e1208] [cursor=pointer]:
                - /url: "#cite_note-x934-169"
          - heading "Misinformation" [level=3] [ref=e1210]
          - note [ref=e1211]:
            - text: "See also:"
            - link "Moon landing conspiracy theories" [ref=e1212] [cursor=pointer]:
              - /url: /wiki/Moon_landing_conspiracy_theories
          - paragraph [ref=e1213]:
            - text: On social media, many conspiracy theorists shared AI-generated videos of Artemis II and others claimed the mission was fake.
            - superscript [ref=e1214]:
              - link "[170]" [ref=e1215] [cursor=pointer]:
                - /url: "#cite_note-170"
            - superscript [ref=e1216]:
              - link "[171]" [ref=e1217] [cursor=pointer]:
                - /url: "#cite_note-171"
            - superscript [ref=e1218]:
              - link "[172]" [ref=e1219] [cursor=pointer]:
                - /url: "#cite_note-172"
            - text: An enhanced photograph of a "colorful Moon" (amplifying the slight color variations in the lunar surface caused by iron and titanium deposits) was spread online and incorrectly attributed to the crew of Artemis II, but was actually taken in August 2025 by Ukrainian amateur
            - link "astrophotographer" [ref=e1220] [cursor=pointer]:
              - /url: /wiki/Astrophotographer
            - text: Ildar Ibatullin.
            - superscript [ref=e1221]:
              - link "[173]" [ref=e1222] [cursor=pointer]:
                - /url: "#cite_note-173"
          - heading "Similar missions" [level=2] [ref=e1224]
          - paragraph [ref=e1225]:
            - text: NASA has described Artemis II's mission objectives as comparable to those of both
            - link "Apollo 7" [ref=e1226] [cursor=pointer]:
              - /url: /wiki/Apollo_7
            - text: and
            - link "Apollo 8" [ref=e1227] [cursor=pointer]:
              - /url: /wiki/Apollo_8
            - text: ", combining tests of the spacecraft in both Earth and lunar orbit into a single mission. However, unlike Apollo 8, Artemis II did not enter lunar orbit due to performance limitations with the ESM, which cannot independently depart from"
            - link "low lunar orbit" [ref=e1228] [cursor=pointer]:
              - /url: /wiki/Low_lunar_orbit
            - text: .
            - superscript [ref=e1229]:
              - link "[174]" [ref=e1230] [cursor=pointer]:
                - /url: "#cite_note-174"
            - superscript [ref=e1231]:
              - link "[175]" [ref=e1232] [cursor=pointer]:
                - /url: "#cite_note-175"
            - superscript [ref=e1233]:
              - link "[176]" [ref=e1234] [cursor=pointer]:
                - /url: "#cite_note-176"
            - text: Instead, Artemis II flew around the Moon on a
            - link "free-return trajectory" [ref=e1235] [cursor=pointer]:
              - /url: /wiki/Free-return_trajectory
            - text: ", like"
            - link "Apollo 13" [ref=e1236] [cursor=pointer]:
              - /url: /wiki/Apollo_13
            - text: in 1970. Also, while Apollo 13 came within 158 miles (254 km) of the lunar surface, Artemis II made its closest approach at approximately 4,607 miles (7,414 km), a little over two lunar diameters.
            - superscript [ref=e1237]:
              - text: "["
              - link "citation needed" [ref=e1239] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - heading "Mission insignia" [level=2] [ref=e1241]
          - generic [ref=e1243]:
            - generic [ref=e1244]:
              - link [ref=e1248] [cursor=pointer]:
                - /url: /wiki/File:Apollo-8-patch.svg
                - img [ref=e1249]
              - link [ref=e1253] [cursor=pointer]:
                - /url: /wiki/File:Artemis_II_patch.svg
                - img [ref=e1254]
            - generic [ref=e1256]: Comparison of the Apollo 8 and Artemis II mission patches
          - paragraph [ref=e1257]:
            - text: The Artemis II mission patch, designed by
            - link "Gregory Manchess" [ref=e1258] [cursor=pointer]:
              - /url: /wiki/Gregory_Manchess
            - text: ","
            - superscript [ref=e1259]:
              - link "[177]" [ref=e1260] [cursor=pointer]:
                - /url: "#cite_note-177"
            - text: has been interpreted as drawing inspiration from the Apollo 8 patch, which featured a vertically oriented
            - link "infinity symbol" [ref=e1261] [cursor=pointer]:
              - /url: /wiki/Infinity_symbol
            - text: alluding to the number 8 and representing the spacecraft's lunar orbit. Similarly, the Artemis II design incorporates a stylized trajectory resembling a half-period curve that subtly evokes the number 2 and corresponds to the first leg of the mission from Earth toward the Moon. The depiction of Earth from beyond the Moon's far side, using a perspective similar to that of the
            - link "Earthrise" [ref=e1263] [cursor=pointer]:
              - /url: /wiki/Earthrise
            - text: photograph from Apollo 8, is descriptive of the mission's distance from Earth. Together, these shared design elements show the parallels between the two missions and support Artemis II's role as the first crewed lunar mission since the Apollo program.
            - superscript [ref=e1264]:
              - link "[178]" [ref=e1265] [cursor=pointer]:
                - /url: "#cite_note-178"
          - paragraph [ref=e1266]:
            - text: During the mission, it was revealed that the astronauts had a double-sided version of the patch made. The reverse side, shown during the return to Earth, featuring an inverted design in which the Earth appeared larger and the Moon was shown in the distance.
            - superscript [ref=e1267]:
              - link "[179]" [ref=e1268] [cursor=pointer]:
                - /url: "#cite_note-179"
          - heading "Wake-up calls" [level=2] [ref=e1270]
          - paragraph [ref=e1271]:
            - text: NASA began the tradition of playing music to astronauts during the
            - link "Gemini program" [ref=e1272] [cursor=pointer]:
              - /url: /wiki/Gemini_program
            - text: ", and first used music to wake up a flight crew during"
            - link "Apollo 15" [ref=e1273] [cursor=pointer]:
              - /url: /wiki/Apollo_15
            - text: . Each track is specially chosen, often by the astronauts' families, and usually has a special meaning to an individual member of the crew, or is applicable to their daily activities.
            - superscript [ref=e1274]:
              - link "[180]" [ref=e1275] [cursor=pointer]:
                - /url: "#cite_note-chronology-180"
          - paragraph [ref=e1276]:
            - text: Artemis II became the first NASA mission to have its wake-up songs compiled into an official
            - link "Spotify" [ref=e1277] [cursor=pointer]:
              - /url: /wiki/Spotify
            - text: playlist.
            - superscript [ref=e1278]:
              - link "[181]" [ref=e1279] [cursor=pointer]:
                - /url: "#cite_note-Space.com4-181"
            - superscript [ref=e1280]:
              - link "[182]" [ref=e1281] [cursor=pointer]:
                - /url: "#cite_note-182"
            - text: In addition, pre-recorded greetings by former Apollo astronauts
            - link "Charlie Duke" [ref=e1282] [cursor=pointer]:
              - /url: /wiki/Charlie_Duke
            - text: and
            - link "Jim Lovell" [ref=e1283] [cursor=pointer]:
              - /url: /wiki/Jim_Lovell
            - text: were also broadcast to the crew,
            - superscript [ref=e1284]:
              - link "[183]" [ref=e1285] [cursor=pointer]:
                - /url: "#cite_note-twitter5-183"
            - superscript [ref=e1286]:
