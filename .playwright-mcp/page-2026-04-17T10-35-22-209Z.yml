          - table "Backup crew" [ref=e596]:
            - caption [ref=e597]: Backup crew
            - rowgroup [ref=e598]:
              - row "Position Astronaut" [ref=e599]:
                - columnheader "Position" [ref=e600]:
                  - link "Position" [ref=e601] [cursor=pointer]:
                    - /url: /wiki/Astronaut_ranks_and_positions
                - columnheader "Astronaut" [ref=e602]
              - row "Mission Specialist Andre Douglas, NASA" [ref=e603]:
                - rowheader "Mission Specialist" [ref=e604]
