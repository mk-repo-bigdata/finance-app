          - figure "The crew of Artemis II walk out of the Operations and Checkout Building, just before boarding the spacecraft on April 1, 2026." [ref=e562]:
            - link [ref=e563] [cursor=pointer]:
              - /url: /wiki/File:Artemis_II_Launch_Crew_Walkout_(NHQ20260401_admin_0005).jpg
              - img [ref=e564]
            - generic [ref=e565]:
              - text: The crew of Artemis II walk out of the
              - link "Operations and Checkout Building" [ref=e566] [cursor=pointer]:
                - /url: /wiki/Operations_and_Checkout_Building
              - text: ", just before boarding the spacecraft on April 1, 2026."
          - figure "The crew of Artemis II training inside an Orion mock-up in January 2025" [ref=e567]:
